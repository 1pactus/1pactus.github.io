        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#cb28ab", "customUrl": "https://pacviewer.com/address/pc1pl4s0ckr6736y46vgl4yt0j4wsw0ey26a3p7uw8", "id": 3168, "label": "pc1pl4s0ckr6736y46vgl4yt0j4wsw0ey26a3p7uw8", "shape": "square", "title": "pc1pl4s0ckr6736y46vgl4yt0j4wsw0ey26a3p7uw8", "x": -1736.4841433154018, "y": 4767.430540845618}, {"color": "#cb28ab", "customUrl": "https://pacviewer.com/address/pc1pmqhz0tfears4raeezkf2uwvgufss96wx4m807r", "id": 3169, "label": "pc1pmqhz0tfears4raeezkf2uwvgufss96wx4m807r", "shape": "square", "title": "pc1pmqhz0tfears4raeezkf2uwvgufss96wx4m807r", "x": 4997.472904045301, "y": -880.2885481146483}, {"color": "#cb28ab", "customUrl": "https://pacviewer.com/address/pc1pqsx6804k7wc2xpx00fjjnzva2le4czq62dfxv7", "id": 3170, "label": "pc1pqsx6804k7wc2xpx00fjjnzva2le4czq62dfxv7", "shape": "square", "title": "pc1pqsx6804k7wc2xpx00fjjnzva2le4czq62dfxv7", "x": -3260.6039029653384, "y": -3888.2016832537943}, {"color": "#cb28ab", "customUrl": "https://pacviewer.com/address/pc1ps2g453had0djm66jnvwvdezhz9ux72h4apmswq", "id": 3171, "label": "pc1ps2g453had0djm66jnvwvdezhz9ux72h4apmswq", "shape": "square", "title": "pc1ps2g453had0djm66jnvwvdezhz9ux72h4apmswq", "x": -5000.0, "y": 880.5620477068068}, {"color": "#cb28ab", "customUrl": "https://pacviewer.com/address/pc1pthw95rtqt7kz6tcm5kk3h57rtxrlcjx6rj3m53", "id": 3172, "label": "pc1pthw95rtqt7kz6tcm5kk3h57rtxrlcjx6rj3m53", "shape": "square", "title": "pc1pthw95rtqt7kz6tcm5kk3h57rtxrlcjx6rj3m53", "x": 3262.362524724325, "y": 3890.0382333760817}, {"color": "#cb28ab", "customUrl": "https://pacviewer.com/address/pc1zptyxgknhv90alla2j0wtdg4zcgsuj6yez69pkt", "id": 3166, "label": "pc1zptyxgknhv90alla2j0wtdg4zcgsuj6yez69pkt", "shape": "dot", "title": "pc1zptyxgknhv90alla2j0wtdg4zcgsuj6yez69pkt", "x": 0.36344418459537, "y": -0.9973756795868705}, {"color": "#cb28ab", "customUrl": "https://pacviewer.com/address/pc1p6hg8f08nmztn7pcvsypzdhth9tw62jw8zmu49m", "id": 3167, "label": "pc1p6hg8f08nmztn7pcvsypzdhth9                   edges = new vis.DataSet([{"color": "#cb28ab", "from": 3168, "label": "0.7", "to": 3166, "value": 0.7}, {"color": "#cb28ab", "from": 3169, "label": "0.7", "to": 3166, "value": 0.7}, {"color": "#cb28ab", "from": 3170, "label": "1.4", "to": 3166, "value": 1.4}, {"color": "#cb28ab", "from": 3171, "label": "0.7", "to": 3166, "value": 0.7}, {"color": "#cb28ab", "from": 3172, "label": "1.4", "to": 3166, "value": 1.4}, {"color": "#cb28ab", "from": 3166, "label": "0.7", "to": 3167, "value": 0.7}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
