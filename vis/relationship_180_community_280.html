        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#a1784e", "customUrl": "https://pacviewer.com/address/pc1z42szllcmng3yus8qzsrlq3ececp8hlx5azkltp", "id": 5422, "label": "pc1z42szllcmng3yus8qzsrlq3ececp8hlx5azkltp", "shape": "dot", "title": "pc1z42szllcmng3yus8qzsrlq3ececp8hlx5azkltp", "x": 298.5776150689758, "y": 0.5669773558985364}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1z8zp9gxhadmx6kj87gayvgrh28gx73wxvyexrey", "id": 5423, "label": "pc1z8zp9gxhadmx6kj87gayvgrh28gx73wxvyexrey, Send to \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1z8zp9gxhadmx6kj87gayvgrh28gx73wxvyexrey", "x": -264.2942605616712, "y": -2299.2001487081}, {"color": "#a1784e", "customUrl": "https://pacviewer.com/address/pc1rxjm8qha2wyvk9usdtl9ctteawalrrkzyfw8ale", "id": 5424, "label": "pc1rxjm8qha2wyvk9usdtl9ctteawalrrkzyfw8ale", "shape": "dot", "title": "pc1rxjm8qha2wyvk9usdtl9ctteawalrrkzyfw8ale", "x": -2340.318952135147, "y": -1583.924407081112}, {"color": "#a1784e", "customUrl": "https://pacviewer.com/address/pc1zmrf3zhhagvpq83830l6lc2vywf6rgyf4dtdcx9", "id": 5432, "label": "pc1zmrf3zhhagvpq83830l6lc2vywf6rgyf4dtdcx9", "shape": "dot", "title": "pc1zmrf3zhhagvpq83830l6lc2vywf6rgyf4dtdcx9", "x": 2664.309562023267, "y": 2278.41710132325}, {"color": "#a1784e", "customUrl": "https://pacviewer.com/address/pc1p0ju9a8m6qal2e6e48pa8md6cjxrtzqeg5clps9", "id": 5433, "label": "pc1p0ju9a8m6qal2e6e48pa8md6cjxrtzqeg5clps9", "shape": "square", "title": "pc1p0ju9a8m6qal2e6e48pa8md6cjxrtzqeg5clps9", "x": 4641.726035604576, "y": 4156.252944598884}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zk9enwuha8xtnj6eef258060rhkzm05g4cmrkdv", "id": 6043, "label": "pc1zk9enwuha8xtnj6eef258060rhkzm05g4cmrkdv, Receive from \u0027Team Salary\u0027", "shape": "triangle", "title": "pc1zk9enwuha8xtnj6eef258060rhkzm05g4cmrkdv", "x": -5000.0, "y": -2552.1124674888206}]);
                  edges = new vis.DataSet([{"color": "#a1784e", "from": 5422, "label": "4005.0", "to": 5423, "value": 4005.0}, {"color": "#a1784e", "from": 5422, "label": "14000.3", "to": 5424, "value": 14000.3}, {"color": "#a1784e", "from": 5422, "label": "1.0", "to": 5432, "value": 1.0}, {"color": "#a1784e", "from": 5423, "label": "14599.0", "to": 5424, "value": 14599.0}, {"color": "#a1784e", "from": 5424, "label": "600.98", "to": 6043, "value": 600.98}, {"color": "#a1784e", "from": 5432, "label": "3.0", "to": 5433, "value": 3.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
