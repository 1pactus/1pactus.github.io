        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var network;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1zs45zqtnqsxjh4nv93jwyehh2c9psl24wkznvvq", "id": 810, "label": "pc1zs45zqtnqsxjh4nv93jwyehh2c9psl24wkznvvq", "shape": "dot", "title": "pc1zs45zqtnqsxjh4nv93jwyehh2c9psl24wkznvvq", "x": 4263.247457789801, "y": -5000.0}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1z0wwq4n5yu4yyaardul34nd64eytslq8k7v0h2t", "id": 15, "label": "pc1z0wwq4n5yu4yyaardul34nd64eytslq8k7v0h2t", "shape": "dot", "title": "pc1z0wwq4n5yu4yyaardul34nd64eytslq8k7v0h2t", "x": -739.6041926491064, "y": 868.534867672514}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1pjztej478y6wgm4extnrp0r7ejwysp26d0306u3", "id": 16, "label": "pc1pjztej478y6wgm4extnrp0r7ejwysp26d0306u3", "shape": "square", "title": "pc1pjztej478y6wgm4extnrp0r7ejwysp26d0306u3", "x": 2008.9635297246393, "y": -2356.3246581900207}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1pkrl8masc7wznvccae9ycej77czxg6puc8f04h0", "id": 17, "label": "pc1pkrl8masc7wznvccae9ycej77czxg6puc8f04h0", "shape": "square", "title": "pc1pkrl8masc7wznvccae9ycej77czxg6puc8f04h0", "x": -3862.4803399091165, "y": -830.3033582746403}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1p2hsfntpv8hn5hfh5q7vsny96tq3zhwk55rjw05", "id": 18, "label": "pc1p2hsfntpv8hn5hfh5q7vsny96tq3zhwk55rjw05", "shape": "square", "title": "pc1p2hsfntpv8hn5hfh5q7vsny96tq3zhwk55rjw05", "x": 1429.6465483475465, "y": 3686.23264440989}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1pxv0rh29ch87qcku57xys20u624l9xeu9jjlrt9", "id": 19, "label": "pc1pxv0rh29ch87qcku57xys20u624l9xeu9jjlrt9", "shape": "square", "title": "pc1pxv0rh29ch87qcku57xys20u624l9xeu9jjlrt9", "x": -3099.773003303763, "y": 3631.8605043822563}]);
                  edges = new vis.DataSet([{"color": "#1f77b4", "from": 810, "label": "191.97", "to": 16, "value": 191.97}, {"color": "#1f77b4", "from": 15, "label": "842.8", "to": 16, "value": 842.8}, {"color": "#1f77b4", "from": 15, "label": "1251.02", "to": 17, "value": 1251.02}, {"color": "#1f77b4", "from": 15, "label": "256.0", "to": 18, "value": 256.0}, {"color": "#1f77b4", "from": 15, "label": "706.22", "to": 19, "value": 706.22}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
