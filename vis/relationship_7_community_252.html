        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#8c564b", "customUrl": "https://pacviewer.com/address/pc1pfjc6fu3ktnhupprcpvs9ty4j0m6shcztrh5mtq", "id": 4064, "label": "pc1pfjc6fu3ktnhupprcpvs9ty4j0m6shcztrh5mtq", "shape": "square", "title": "pc1pfjc6fu3ktnhupprcpvs9ty4j0m6shcztrh5mtq", "x": 2868.170861472627, "y": 4094.1174205810444}, {"color": "#8c564b", "customUrl": "https://pacviewer.com/address/pc1zchtw63gnf29nkqytfdthpyhf50rc3dzrnh6cg2", "id": 1185, "label": "pc1zchtw63gnf29nkqytfdthpyhf50rc3dzrnh6cg2", "shape": "dot", "title": "pc1zchtw63gnf29nkqytfdthpyhf50rc3dzrnh6cg2", "x": 4781.6272428533475, "y": -1464.1311951933408}, {"color": "#8c564b", "customUrl": "https://pacviewer.com/address/pc1p4f7djwggtswy6wsc33xal4f3r3fdfv5lf7dals", "id": 493, "label": "pc1p4f7djwggtswy6wsc33xal4f3r3fdfv5lf7dals", "shape": "square", "title": "pc1p4f7djwggtswy6wsc33xal4f3r3fdfv5lf7dals", "x": 86.72307504703946, "y": -5000.0}, {"color": "#8c564b", "customUrl": "https://pacviewer.com/address/pc1ryefge8stk7lh6lqmd4dpm4mq5gdfdexmtqueu2", "id": 1168, "label": "pc1ryefge8stk7lh6lqmd4dpm4mq5gdfdexmtqueu2", "shape": "dot", "title": "pc1ryefge8stk7lh6lqmd4dpm4mq5gdfdexmtqueu2", "x": -4726.97262738852, "y": -1626.029857704503}, {"color": "#8c564b", "customUrl": "https://pacviewer.com/address/pc1zc7ken5ugtdhwnwuzajmgc33pcrr382yjj7f9ta", "id": 1169, "label": "pc1zc7ken5ugtdhwnwuzajmgc33pcrr382yjj7f9ta", "shape": "dot", "title": "pc1zc7ken5ugtdhwnwuzajmgc33pcrr382yjj7f9ta", "x": -0.6299343534389638, "y": 0.8375052191765523}, {"color": "#8c564b", "customUrl": "https://pacviewer.com/address/pc1zyc4hz8pnyxrpn0r306u060zw8wensv9x9fge2s", "id": 1203, "label": "pc1zyc4hz8pnyxrpn0r306u060zw8wensv9x9fge2s", "shape": "dot", "title": "pc1zyc4hz8pnyxrpn0r306u060zw8wensv9x9fge2s", "x": -3008.9186176310545, "y": 3995.2061270976237}]);
                  edges = new vis.DataSet([{"color": "#8c564b", "from": 4064, "label": "999.99", "to": 1169, "value": 999.99}, {"color": "#8c564b", "from": 1185, "label": "0.64", "to": 1169, "value": 0.64}, {"color": "#8c564b", "from": 493, "label": "4.9", "to": 1169, "value": 4.9}, {"color": "#8c564b", "from": 1168, "label": "0.48", "to": 1169, "value": 0.48}, {"color": "#8c564b", "from": 1169, "label": "0.41", "to": 1203, "value": 0.41}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
