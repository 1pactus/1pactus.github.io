        <script type="text/javascript">

              // initialize global variables.

              var network;

              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#7f7f7f", "customUrl": "https://pacviewer.com/address/pc1rtjplegw0er2u0vkuvh70l9fl5zw26d8ddn33a7", "id": 2582, "label": "pc1rtjplegw0er2u0vkuvh70l9fl5zw26d8ddn33a7", "shape": "dot", "title": "pc1rtjplegw0er2u0vkuvh70l9fl5zw26d8ddn33a7", "x": 0.7492943582594895, "y": 1.3685110154282}, {"color": "#7f7f7f", "customUrl": "https://pacviewer.com/address/pc1p5g90kj7xatte8aeclkl89l0l4n7a7xl5dyvqhy", "id": 2583, "label": "pc1p5g90kj7xatte8aeclkl89l0l4n7a7xl5dyvqhy", "shape": "square", "title": "pc1p5g90kj7xatte8aeclkl89l0l4n7a7xl5dyvqhy", "x": 4520.074195647787, "y": -2273.078856058627}, {"color": "#7f7f7f", "customUrl": "https://pacviewer.com/address/pc1p626vx5agrx8luje5nyq46g7hhjmrgvwmtn5he5", "id": 2584, "label": "pc1p626vx5agrx8luje5nyq46g7hhjmrgvwmtn5he5", "shape": "square", "title": "pc1p626vx5agrx8luje5nyq46g7hhjmrgvwmtn5he5", "x": -763.8720934493388, "y": -5000.0}, {"color": "#7f7f7f", "customUrl": "https://pacviewer.com/address/pc1pj2dffeef5ff00valms7dnj7pv2sw0zw2q3rh8z", "id": 2585, "label": "pc1pj2dffeef5ff00valms7dnj7pv2sw0zw2q3rh8z", "shape": "square", "title": "pc1pj2dffeef5ff00valms7dnj7pv2sw0zw2q3rh8z", "x": -4993.009016416194, "y": -819.945149463196}, {"color": "#7f7f7f", "customUrl": "https://pacviewer.com/address/pc1pqqcav9z6p5exrurjln2jmql7sglv80lhnxykgu", "id": 2586, "label": "pc1pqqcav9z6p5exrurjln2jmql7sglv80lhnxykgu", "shape": "square", "title": "pc1pqqcav9z6p5exrurjln2jmql7sglv80lhnxykgu", "x": 3558.526958869404, "y": 3597.2226300757275}, {"color": "#7f7f7f", "customUrl": "https://pacviewer.com/address/pc1pudcuxw0c5kmhmhfrzmavvjp0gf43h4hf79hz0j", "id": 2587, "label": "pc1pudcuxw0c5kmhmhfrzmavvjp0gf43h4hf79hz0j", "shape": "square", "title": "pc1pudcuxw0c5kmhmhfrzmavvjp0gf43h4hf79hz0j", "x": -2322.4693390099187, "y": 4494.432864430668}]);
                  edges = new vis.DataSet([{"color": "#7f7f7f", "from": 2582, "label": "17.0", "to": 2583, "value": 17.0}, {"color": "#7f7f7f", "from": 2582, "label": "26.0", "to": 2584, "value": 26.0}, {"color": "#7f7f7f", "from": 2582, "label": "19.0", "to": 2585, "value": 19.0}, {"color": "#7f7f7f", "from": 2582, "label": "31.0", "to": 2586, "value": 31.0}, {"color": "#7f7f7f", "from": 2582, "label": "14.0", "to": 2587, "value": 14.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
