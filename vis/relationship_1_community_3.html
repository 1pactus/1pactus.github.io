        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {

              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1z0wwq4n5yu4yyaardul34nd64eytslq8k7v0h2t", "id": 133, "label": "pc1z0wwq4n5yu4yyaardul34nd64eytslq8k7v0h2t", "shape": "dot", "title": "pc1z0wwq4n5yu4yyaardul34nd64eytslq8k7v0h2t", "x": 291.1708528787981, "y": 5000.0}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1rqwxzseuu7agctsulvydzguefm436vmrr0uxt0h", "id": 112, "label": "pc1rqwxzseuu7agctsulvydzguefm436vmrr0uxt0h", "shape": "dot", "title": "pc1rqwxzseuu7agctsulvydzguefm436vmrr0uxt0h", "x": -43.08665024241571, "y": -713.8018712058814}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1pj7k8umrc563g2c2xq5pgxhrssyl52ud235j0k6", "id": 113, "label": "pc1pj7k8umrc563g2c2xq5pgxhrssyl52ud235j0k6", "shape": "square", "title": "pc1pj7k8umrc563g2c2xq5pgxhrssyl52ud235j0k6", "x": 143.67573302953144, "y": 2470.3002729466957}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1pc489t3rd2nz86w7z2y8ntnc46lqwg0jdakpzsr", "id": 114, "label": "pc1pc489t3rd2nz86w7z2y8ntnc46lqwg0jdakpzsr", "shape": "square", "title": "pc1pc489t3rd2nz86w7z2y8ntnc46lqwg0jdakpzsr", "x": -1576.0749421204584, "y": -2898.125855675082}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1pjztej478y6wgm4extnrp0r7ejwysp26d0306u3", "id": 115, "label": "pc1pjztej478y6wgm4extnrp0r7ejwysp26d0306u3", "shape": "square", "title": "pc1pjztej478y6wgm4extnrp0r7ejwysp26d0306u3", "x": 2532.1114804324716, "y": -546.997636613507}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1pkrl8masc7wznvccae9ycej77czxg6puc8f04h0", "id": 116, "label": "pc1pkrl8masc7wznvccae9ycej77czxg6puc8f04h0", "shape": "square", "title": "pc1pkrl8masc7wznvccae9ycej77czxg6puc8f04h0", "x": -2582.356372808325, "y": -252.9491935154296}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1pxv0rh29ch87qcku57xys20u624l9xeu9jjlrt9", "id": 117, "label": "pc1pxv0rh29ch87qcku57xys20u624l9xeu9jjlrt9", "shape": "square", "title": "pc1pxv0rh29ch87qcku57xys20u624l9xeu9jjlrt9", "x": 1234.5598988303977, "y": -3058.4257159367958}]);
                  edges = new vis.DataSet([{"color": "#17cd77", "from": 133, "label": "51.0", "to": 113, "value": 51.0}, {"color": "#17cd77", "from": 112, "label": "111.4", "to": 113, "value": 111.4}, {"color": "#17cd77", "from": 112, "label": "2.8", "to": 114, "value": 2.8}, {"color": "#17cd77", "from": 112, "label": "2.8", "to": 115, "value": 2.8}, {"color": "#17cd77", "from": 112, "label": "3.5", "to": 116, "value": 3.5}, {"color": "#17cd77", "from": 112, "label": "2.1", "to": 117, "value": 2.1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
