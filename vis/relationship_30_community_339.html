              function drawGraph() {

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#a061bf", "customUrl": "https://pacviewer.com/address/pc1puel84gmtamypx6x22zrppx9fsqpgz5ftah6g5g", "id": 4160, "label": "pc1puel84gmtamypx6x22zrppx9fsqpgz5ftah6g5g", "shape": "square", "title": "pc1puel84gmtamypx6x22zrppx9fsqpgz5ftah6g5g", "x": 1860.6985031279721, "y": 4697.885516703805}, {"color": "#a061bf", "customUrl": "https://pacviewer.com/address/pc1p76kctxjefr3peap9yreq6732zgf66lva95snvt", "id": 4161, "label": "pc1p76kctxjefr3peap9yreq6732zgf66lva95snvt", "shape": "square", "title": "pc1p76kctxjefr3peap9yreq6732zgf66lva95snvt", "x": 5000.0, "y": 738.2182817242635}, {"color": "#a061bf", "customUrl": "https://pacviewer.com/address/pc1ppja5v4n3y5yzye7xxhq4f2m9w023ydfv4cr9jn", "id": 4162, "label": "pc1ppja5v4n3y5yzye7xxhq4f2m9w023ydfv4cr9jn", "shape": "square", "title": "pc1ppja5v4n3y5yzye7xxhq4f2m9w023ydfv4cr9jn", "x": -1860.7652211361042, "y": -4698.05465179443}, {"color": "#a061bf", "customUrl": "https://pacviewer.com/address/pc1p60l3afeylea32xrsr0z3xpktanfm837quewp2j", "id": 4163, "label": "pc1p60l3afeylea32xrsr0z3xpktanfm837quewp2j", "shape": "square", "title": "pc1p60l3afeylea32xrsr0z3xpktanfm837quewp2j", "x": -4999.463643769867, "y": -738.9639133858069}, {"color": "#a061bf", "customUrl": "https://pacviewer.com/address/pc1rsdajlupvvh7nqr2qptdqyq78p3jd2qa2aey259", "id": 4157, "label": "pc1rsdajlupvvh7nqr2qptdqyq78p3jd2qa2aey259", "shape": "dot", "title": "pc1rsdajlupvvh7nqr2qptdqyq78p3jd2qa2aey259", "x": 0.43091434604851275, "y": 1.0884955477797007}, {"color": "#a061bf", "customUrl": "https://pacviewer.com/address/pc1ps3qv5xey7hhjssgyd0ktxkjnqslmvqu2850mmm", "id": 4158, "label": "pc1ps3qv5xey7hhjssgyd0ktxkjnqslmvqu2850mmm", "shape": "square", "title": "pc1ps3qv5xey7hhjssgyd0ktxkjnqslmvqu2850mmm", "x": -3138.5160784475447, "y": 3961.654704768959}, {"color": "#a061bf", "customUrl": "https://pacviewer.com/address/pc1pv7l7pcdmfndmz34f5d9n8q9gzqdk26hcuy82m3", "id": 4159, "label": "pc1pv7l7pcdmfndmz34f5d9n8q9gzqdk26hcuy82m3", "shape": "square", "title": "pc1pv7l7pcdmfndmz34f5d9n8q9gzqdk26hcuy82m3", "x": 3137.6155258794947, "y": -3961.82843356457}]);
                  edges = new vis.DataSet([{"color": "#a061bf", "from": 4160, "label": "1.0", "to": 4157, "value": 1.0}, {"color": "#a061bf", "from": 4161, "label": "2.0", "to": 4157, "value": 2.0}, {"color": "#a061bf", "from": 4162, "label": "1.0", "to": 4157, "value": 1.0}, {"color": "#a061bf", "from": 4163, "label": "1.0", "to": 4157, "value": 1.0}, {"color": "#a061bf", "from": 4157, "label": "1.0", "to": 4158, "value": 1.0}, {"color": "#a061bf", "from": 4157, "label": "2.0", "to": 4159, "value": 2.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
