                  nodes = new vis.DataSet([{"color": "#2a2bba", "customUrl": "https://pacviewer.com/address/pc1ppq6a97ujmfw57zap3fuwqnrmjykm4y7l9ze58c", "id": 4448, "label": "pc1ppq6a97ujmfw57zap3fuwqnrmjykm4y7l9ze58c", "shape": "square", "title": "pc1ppq6a97ujmfw57zap3fuwqnrmjykm4y7l9ze58c", "x": 699.7164496373032, "y": 5000.0}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1rc9uux205akhax45zfklltkc9uvnmnk4kjtxm86", "id": 3009, "label": "pc1rc9uux205akhax45zfklltkc9uvnmnk4kjtxm86, Send to \u0027Wrapto Lock\u0027", "shape": "triangle", "title": "pc1rc9uux205akhax45zfklltkc9uvnmnk4kjtxm86", "x": 981.722494764827, "y": -3564.824100108303}, {"color": "#2a2bba", "customUrl": "https://pacviewer.com/address/pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "id": 3011, "label": "pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "shape": "dot", "title": "pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "x": -264.3499696309905, "y": -1888.9820703151886}, {"color": "#2a2bba", "customUrl": "https://pacviewer.com/address/pc1r4haprypgvexdgah3fj23sh56hv8ru63d3h6d0w", "id": 3012, "label": "pc1r4haprypgvexdgah3fj23sh56hv8ru63d3h6d0w", "shape": "dot", "title": "pc1r4haprypgvexdgah3fj23sh56hv8ru63d3h6d0w", "x": -1922.5912657629224, "y": -3158.3818889370473}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1rf778w4gm5knl4yht45ly2u52edrlhht536275k", "id": 2981, "label": "pc1rf778w4gm5knl4yht45ly2u52edrlhht536275k, Send to \u0027Wrapto Lock\u0027", "shape": "triangle", "title": "pc1rf778w4gm5knl4yht45ly2u52edrlhht536275k", "x": 86.97162456364957, "y": 621.4739427854201}, {"color": "#2a2bba", "customUrl": "https://pacviewer.com/address/pc1zfeygxpmslu2z3zv7e36kmsyqkdett4gm0jh3l6", "id": 2982, "label": "pc1zfeygxpmslu2z3zv7e36kmsyqkdett4gm0jh3l6", "shape": "dot", "title": "pc1zfeygxpmslu2z3zv7e36kmsyqkdett4gm0jh3l6", "x": 418.5306664281328, "y": 2990.714116575118}]);
                  edges = new vis.DataSet([{"color": "#2a2bba", "from": 4448, "label": "399.98", "to": 2982, "value": 399.98}, {"color": "#2a2bba", "from": 3009, "label": "1124.25", "to": 3011, "value": 1124.25}, {"color": "#2a2bba", "from": 3011, "label": "307.75", "to": 3012, "value": 307.75}, {"color": "#2a2bba", "from": 3011, "label": "5.0", "to": 2981, "value": 5.0}, {"color": "#2a2bba", "from": 2981, "label": "401.97", "to": 2982, "value": 401.97}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;
