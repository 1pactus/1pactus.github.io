                  nodes = new vis.DataSet([{"color": "#b29933", "customUrl": "https://pacviewer.com/address/pc1pn0yjf84swplaj68y4ju3y46wfjg4umue9qc4dn", "id": 4192, "label": "pc1pn0yjf84swplaj68y4ju3y46wfjg4umue9qc4dn", "shape": "square", "title": "pc1pn0yjf84swplaj68y4ju3y46wfjg4umue9qc4dn", "x": 417.60935130265, "y": 5000.0}, {"color": "#b29933", "customUrl": "https://pacviewer.com/address/pc1pn2p02cdk85mhrghxlq8zsnx3fyxcv4hd6rtmgr", "id": 4193, "label": "pc1pn2p02cdk85mhrghxlq8zsnx3fyxcv4hd6rtmgr", "shape": "square", "title": "pc1pn2p02cdk85mhrghxlq8zsnx3fyxcv4hd6rtmgr", "x": 76.52079306236107, "y": -2948.8231880057365}, {"color": "#b29933", "customUrl": "https://pacviewer.com/address/pc1zk2x8celhsl3hlqcg6eu0676h5qqjtmetm7v0q9", "id": 4514, "label": "pc1zk2x8celhsl3hlqcg6eu0676h5qqjtmetm7v0q9", "shape": "dot", "title": "pc1zk2x8celhsl3hlqcg6eu0676h5qqjtmetm7v0q9", "x": -3053.8237564113997, "y": -4153.753919563929}, {"color": "#b29933", "customUrl": "https://pacviewer.com/address/pc1zddsyd46ylk69y2m84psh840a7w3tlu8e4xyknt", "id": 4189, "label": "pc1zddsyd46ylk69y2m84psh840a7w3tlu8e4xyknt", "shape": "dot", "title": "pc1zddsyd46ylk69y2m84psh840a7w3tlu8e4xyknt", "x": 749.3198283599969, "y": 1019.234267275279}, {"color": "#b29933", "customUrl": "https://pacviewer.com/address/pc1p3ud746d4sltk7ylne49phv6c495p3sh2062yd5", "id": 4190, "label": "pc1p3ud746d4sltk7ylne49phv6c495p3sh2062yd5", "shape": "square", "title": "pc1p3ud746d4sltk7ylne49phv6c495p3sh2062yd5", "x": 4647.830844948592, "y": 1889.844833628402}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zyqm252kzjm4na7rjsmv8ny9858lgd8d0g2spuv", "id": 4191, "label": "pc1zyqm252kzjm4na7rjsmv8ny9858lgd8d0g2spuv, Send to \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1zyqm252kzjm4na7rjsmv8ny9858lgd8d0g2spuv", "x": -2837.457061262199, "y": -806.501993334016}]);
                  edges = new vis.DataSet([{"color": "#b29933", "from": 4192, "label": "821.35", "to": 4189, "value": 821.35}, {"color": "#b29933", "from": 4193, "label": "218.03", "to": 4189, "value": 218.03}, {"color": "#b29933", "from": 4193, "label": "647.25", "to": 4514, "value": 647.25}, {"color": "#b29933", "from": 4514, "label": "727.0", "to": 4191, "value": 727.0}, {"color": "#b29933", "from": 4189, "label": "406.01", "to": 4190, "value": 406.01}, {"color": "#b29933", "from": 4189, "label": "774.0", "to": 4191, "value": 774.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
