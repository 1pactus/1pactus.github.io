        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ff7f0e", "customUrl": "https://pacviewer.com/address/pc1rxrn6zsgtc79z9udynccc09hny8akhnpt7e4ufa", "id": 1825, "label": "pc1rxrn6zsgtc79z9udynccc09hny8akhnpt7e4ufa", "shape": "dot", "title": "pc1rxrn6zsgtc79z9udynccc09hny8akhnpt7e4ufa", "x": 109.29780333247012, "y": -778.5759681862435}, {"color": "#ff7f0e", "customUrl": "https://pacviewer.com/address/pc1plxhnqd986ghfvf9sah8h5kw46wvcjy8h60qm8k", "id": 1826, "label": "pc1plxhnqd986ghfvf9sah8h5kw46wvcjy8h60qm8k", "shape": "square", "title": "pc1plxhnqd986ghfvf9sah8h5kw46wvcjy8h60qm8k", "x": 2627.610147031584, "y": -1483.0992154899122}, {"color": "#ff7f0e", "customUrl": "https://pacviewer.com/address/pc1pq6jja0xqn5jal9qha5fhs05gtxmpryuq46eacr", "id": 4113, "label": "pc1pq6jja0xqn5jal9qha5fhs05gtxmpryuq46eacr", "shape": "square", "title": "pc1pq6jja0xqn5jal9qha5fhs05gtxmpryuq46eacr", "x": -2297.257752426098, "y": -2162.0835370776595}, {"color": "#ff7f0e", "customUrl": "https://pacviewer.com/address/pc1z6fx9sd63fzv63zr65ygtp6wmm0hmak5acdu7jk", "id": 3226, "label": "pc1z6fx9sd63fzv63zr65ygtp6wmm0hmak5acdu7jk", "shape": "dot", "title": "pc1z6fx9sd63fzv63zr65ygtp6wmm0hmak5acdu7jk", "x": 1577.6075914572211, "y": -2977.0448379912436}, {"color": "#ff7f0e", "customUrl": "https://pacviewer.com/address/pc1znsrh0g6dxyv5gj0w9m3a02gyahgdpc6lxpca5t", "id": 3227, "label": "pc1znsrh0g6dxyv5gj0w9m3a02gyahgdpc6lxpca5t", "shape": "dot", "title": "pc1znsrh0g6dxyv5gj0w9m3a02gyahgdpc6lxpca5t", "x": -683.2271904683251, "y": 2400.8035587450595}, {"color": "#ff7f0e", "customUrl": "https://pacviewer.com/address/pc1pswh664zqny77z3z8phmzhdmf5s9qhfqzelc400", "id": 3228, "label": "pc1pswh664zqny77z3z8phmzhdmf5s9qhfqzelc400", "shape": "square", "title": "pc1pswh664zqny77z3z8phmzhdmf5s9qhfqzelc400", "x": -1334.0305989268522, "y": 5000.0}]);
                  edges = new vis.DataSet([{"color": "#ff7f0e", "from": 1825, "label": "296.0", "to": 1826, "value": 296.0}, {"color": "#ff7f0e", "from": 1825, "label": "53.0", "to": 3226, "value": 53.0}, {"color": "#ff7f0e", "from": 1825, "label": "89.0", "to": 3227, "value": 89.0}, {"color": "#ff7f0e", "from": 1825, "label": "150.0", "to": 4113, "value": 150.0}, {"color": "#ff7f0e", "from": 1826, "label": "44.0", "to": 3226, "value": 44.0}, {"color": "#ff7f0e", "from": 3227, "label": "24.0", "to": 3228, "value": 24.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
