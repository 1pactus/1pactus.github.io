        <script type="text/javascript">

              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#617cd1", "customUrl": "https://pacviewer.com/address/pc1rp0sccvyjzy09hnf33ppdchfl2ylkgp3uwja6jd", "id": 4389, "label": "pc1rp0sccvyjzy09hnf33ppdchfl2ylkgp3uwja6jd", "shape": "dot", "title": "pc1rp0sccvyjzy09hnf33ppdchfl2ylkgp3uwja6jd", "x": -1399.3874400360182, "y": -1161.9616141435665}, {"color": "#617cd1", "customUrl": "https://pacviewer.com/address/pc1zxm8na226h2ssychx0g8u3m9lf9p7h5g9hns5qh", "id": 2182, "label": "pc1zxm8na226h2ssychx0g8u3m9lf9p7h5g9hns5qh", "shape": "dot", "title": "pc1zxm8na226h2ssychx0g8u3m9lf9p7h5g9hns5qh", "x": 5000.0, "y": 95.23942482858006}, {"color": "#617cd1", "customUrl": "https://pacviewer.com/address/pc1pupx4q46hypa8vlhmfuz7tlzlm6farymp2cfry6", "id": 4390, "label": "pc1pupx4q46hypa8vlhmfuz7tlzlm6farymp2cfry6", "shape": "square", "title": "pc1pupx4q46hypa8vlhmfuz7tlzlm6farymp2cfry6", "x": -3257.358321872841, "y": -3793.118168743493}, {"color": "#617cd1", "customUrl": "https://pacviewer.com/address/pc1z598v0qmezetzy2knv5n4wgzu74eyad0ujmejpu", "id": 2168, "label": "pc1z598v0qmezetzy2knv5n4wgzu74eyad0ujmejpu", "shape": "dot", "title": "pc1z598v0qmezetzy2knv5n4wgzu74eyad0ujmejpu", "x": 156.19594575151228, "y": 2835.836420200833}, {"color": "#617cd1", "customUrl": "https://pacviewer.com/address/pc1p3pdpc4m40hp2v236hvl53qn7mhmyewfds6es5l", "id": 2169, "label": "pc1p3pdpc4m40hp2v236hvl53qn7mhmyewfds6es5l", "shape": "square", "title": "pc1p3pdpc4m40hp2v236hvl53qn7mhmyewfds6es5l", "x": 1786.7419127231146, "y": 338.79806077319034}, {"color": "#617cd1", "customUrl": "https://pacviewer.com/address/pc1p5uhchsuvsl6f2hdpcattezccqecjlhr9vcm84d", "id": 2170, "label": "pc1p5uhchsuvsl6f2hdpcattezccqecjlhr9vcm84d", "shape": "square", "title": "pc1p5uhchsuvsl6f2hdpcattezccqecjlhr9vcm84d", "x": -2286.1920965657673, "y": 1685.205877084457}]);
                  edges = new vis.DataSet([{"color": "#617cd1", "from": 4389, "label": "341.0", "to": 4390, "value": 341.0}, {"color": "#617cd1", "from": 4389, "label": "189.02", "to": 2169, "value": 189.02}, {"color": "#617cd1", "from": 4389, "label": "174.01", "to": 2170, "value": 174.01}, {"color": "#617cd1", "from": 2182, "label": "184.04", "to": 2169, "value": 184.04}, {"color": "#617cd1", "from": 2168, "label": "569.02", "to": 2169, "value": 569.02}, {"color": "#617cd1", "from": 2168, "label": "313.04", "to": 2170, "value": 313.04}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
