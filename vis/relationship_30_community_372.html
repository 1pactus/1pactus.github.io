        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1r3vmhnvtfxs54lm5jpu33z3etmm3lvevlt7uz85", "id": 3248, "label": "pc1r3vmhnvtfxs54lm5jpu33z3etmm3lvevlt7uz85", "shape": "dot", "title": "pc1r3vmhnvtfxs54lm5jpu33z3etmm3lvevlt7uz85", "x": -2356.951730192443, "y": -586.5677839167297}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1zrnussktcazmjd7k5lax8wpqg6dmw7yeu5ywsr0", "id": 1361, "label": "pc1zrnussktcazmjd7k5lax8wpqg6dmw7yeu5ywsr0", "shape": "dot", "title": "pc1zrnussktcazmjd7k5lax8wpqg6dmw7yeu5ywsr0", "x": 869.5338361185389, "y": 217.02348810606298}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1phzsk88mf00zrkywj2auddph8kwmvelxclxe2mj", "id": 1362, "label": "pc1phzsk88mf00zrkywj2auddph8kwmvelxclxe2mj", "shape": "square", "title": "pc1phzsk88mf00zrkywj2auddph8kwmvelxclxe2mj", "x": 2085.5858775330667, "y": -2291.02926592046}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1ptfr2degxs2vq28u242z8l33ttfu8mr9arkz6mr", "id": 4243, "label": "pc1ptfr2degxs2vq28u242z8l33ttfu8mr9arkz6mr", "shape": "square", "title": "pc1ptfr2degxs2vq28u242z8l33ttfu8mr9arkz6mr", "x": -5000.0, "y": -1245.586742237123}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1p6tn54waq4tvjhtmdhknnrmkk83s0zukk43up7u", "id": 1363, "label": "pc1p6tn54waq4tvjhtmdhknnrmkk83s0zukk43up7u", "shape": "square", "title": "pc1p6tn54waq4tvjhtmdhknnrmkk83s0zukk43up7u", "x": 3632.5868145389, "y": 902.9709643296471}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1pxzmjpavu7jkm33qfef7ets3tcjr23ce8hrym0j", "id": 1364, "label": "pc1pxzmjpavu7jkm33qfef7ets3tcjr23ce8hrym0j", "shape": "square", "title": "pc1pxzmjpavu7jkm33qfef7ets3tcjr23ce8hrym0j", "x": 769.2452020019374, "y": 3003.189339638603}]);
                  edges = new vis.DataSet([{"color": "#8c847b", "from": 3248, "label": "149.7", "to": 1361, "value": 149.7}, {"color": "#8c847b", "from": 3248, "label": "149.8", "to": 4243, "value": 149.8}, {"color": "#8c847b", "from": 1361, "label": "500.0", "to": 1362, "value": 500.0}, {"color": "#8c847b", "from": 1361, "label": "103.03", "to": 1363, "value": 103.03}, {"color": "#8c847b", "from": 1361, "label": "104.01", "to": 1364, "value": 104.01}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
