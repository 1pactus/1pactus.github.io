        <script type="text/javascript">

              // initialize global variables.
              var edges;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1zeawmcewf9s3c3905x9danyf860jf7vjkvtv4sl", "id": 5688, "label": "pc1zeawmcewf9s3c3905x9danyf860jf7vjkvtv4sl", "shape": "dot", "title": "pc1zeawmcewf9s3c3905x9danyf860jf7vjkvtv4sl", "x": -3071.5213953533766, "y": 1684.1721073316514}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1znffmn2897jw99rqrylks0dnn67usnq57wa4vhn", "id": 3828, "label": "pc1znffmn2897jw99rqrylks0dnn67usnq57wa4vhn", "shape": "dot", "title": "pc1znffmn2897jw99rqrylks0dnn67usnq57wa4vhn", "x": 410.5266420619227, "y": -225.42557687890206}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1plfr4vlztf45rkvqa08q0gw24qmw3s9g3h57azs", "id": 3829, "label": "pc1plfr4vlztf45rkvqa08q0gw24qmw3s9g3h57azs", "shape": "square", "title": "pc1plfr4vlztf45rkvqa08q0gw24qmw3s9g3h57azs", "x": 2148.3658546743786, "y": -4563.680182487186}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1zavclwreae8aaxxyskxk3axevl4tpxh4kmu9mw7", "id": 3830, "label": "pc1zavclwreae8aaxxyskxk3axevl4tpxh4kmu9mw7", "shape": "dot", "title": "pc1zavclwreae8aaxxyskxk3axevl4tpxh4kmu9mw7", "x": -3719.8922855878786, "y": -1464.9214505202249}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1per9q4ceggs7h0p08vx74azmlmnrn7k3t0d5pey", "id": 3831, "label": "pc1per9q4ceggs7h0p08vx74azmlmnrn7k3t0d5pey", "shape": "square", "title": "pc1per9q4ceggs7h0p08vx74azmlmnrn7k3t0d5pey", "x": 5000.0, "y": 645.8312251690079}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1pf85xnevas880wymexd45vd8g38uvekprapv2d5", "id": 3832, "label": "pc1pf85xnevas880wymexd45vd8g38uvekprapv2d5", "shape": "square", "title": "pc1pf85xnevas880wymexd45vd8g38uvekprapv2d5", "x": -767.4788157950463, "y": 3924.0238773856536}]);
                  edges = new vis.DataSet([{"color": "#cb4193", "from": 5688, "label": "480.0", "to": 3830, "value": 480.0}, {"color": "#cb4193", "from": 5688, "label": "517.0", "to": 3828, "value": 517.0}, {"color": "#cb4193", "from": 5688, "label": "422.23", "to": 3832, "value": 422.23}, {"color": "#cb4193", "from": 3828, "label": "1169.03", "to": 3829, "value": 1169.03}, {"color": "#cb4193", "from": 3828, "label": "10.0", "to": 3830, "value": 10.0}, {"color": "#cb4193", "from": 3828, "label": "741.32", "to": 3831, "value": 741.32}, {"color": "#cb4193", "from": 3828, "label": "327.06", "to": 3832, "value": 327.06}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
