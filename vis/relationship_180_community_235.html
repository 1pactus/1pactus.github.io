        <script type="text/javascript">

              // initialize global variables.

              function drawGraph() {

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1z7chyclruwywl7pcljmq0gl9luvj960tefyk8ya", "id": 4875, "label": "pc1z7chyclruwywl7pcljmq0gl9luvj960tefyk8ya", "shape": "dot", "title": "pc1z7chyclruwywl7pcljmq0gl9luvj960tefyk8ya", "x": 273.42835239963983, "y": -2825.813041397651}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1zcmc9j3f6zd728qawpuk620a74t3e55t6zfwgmg", "id": 4012, "label": "pc1zcmc9j3f6zd728qawpuk620a74t3e55t6zfwgmg", "shape": "dot", "title": "pc1zcmc9j3f6zd728qawpuk620a74t3e55t6zfwgmg", "x": -1445.2400328476058, "y": 1103.6160408784465}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1pr97zjdea4m6m3vysx0u8zru3tgjqm7m552tjvz", "id": 4013, "label": "pc1pr97zjdea4m6m3vysx0u8zru3tgjqm7m552tjvz", "shape": "square", "title": "pc1pr97zjdea4m6m3vysx0u8zru3tgjqm7m552tjvz", "x": 1799.8922708424866, "y": -264.9840771234904}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zmqgp4mu3pxxgr9m7hl6xgfus7035lc2t7tam59", "id": 4014, "label": "pc1zmqgp4mu3pxxgr9m7hl6xgfus7035lc2t7tam59, Send to \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1zmqgp4mu3pxxgr9m7hl6xgfus7035lc2t7tam59", "x": -2215.70110854834, "y": -1776.0305711970327}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1rlm2xphh7u3g25uh3h04msaga0sk3svml5sfyyx", "id": 6766, "label": "pc1rlm2xphh7u3g25uh3h04msaga0sk3svml5sfyyx", "shape": "dot", "title": "pc1rlm2xphh7u3g25uh3h04msaga0sk3svml5sfyyx", "x": 5000.0, "y": 108.17858966933345}, {"color": "#cb4193", "customUrl": "https://pacviewer.com/address/pc1pwh2y6sc8k24ylqxjyp8apejp0a0pflpn9n9lmt", "id": 4015, "label": "pc1pwh2y6sc8k24ylqxjyp8apejp0a0pflpn9n9lmt", "shape": "square", "title": "pc1pwh2y6sc8k24ylqxjyp8apejp0a0pflpn9n9lmt", "x": -3412.3794818461806, "y": 3655.0330591703937}]);
                  edges = new vis.DataSet([{"color": "#cb4193", "from": 4875, "label": "114.0", "to": 4014, "value": 114.0}, {"color": "#cb4193", "from": 4875, "label": "44.02", "to": 4013, "value": 44.02}, {"color": "#cb4193", "from": 4012, "label": "533.0", "to": 4013, "value": 533.0}, {"color": "#cb4193", "from": 4012, "label": "94.0", "to": 4014, "value": 94.0}, {"color": "#cb4193", "from": 4012, "label": "21.0", "to": 4015, "value": 21.0}, {"color": "#cb4193", "from": 4013, "label": "5.0", "to": 6766, "value": 5.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
