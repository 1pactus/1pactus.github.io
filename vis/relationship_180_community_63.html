        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zhghsd99wfdxly05x87ux5v6g72sehef5wtmqh7", "id": 1888, "label": "pc1zhghsd99wfdxly05x87ux5v6g72sehef5wtmqh7, Send to \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1zhghsd99wfdxly05x87ux5v6g72sehef5wtmqh7", "x": -238.6084609241095, "y": -950.6486146675959}, {"color": "#8768d8", "customUrl": "https://pacviewer.com/address/pc1pg6mx3fk9t53twg5sa6rnxd7nyynt4uq0adypga", "id": 2528, "label": "pc1pg6mx3fk9t53twg5sa6rnxd7nyynt4uq0adypga", "shape": "square", "title": "pc1pg6mx3fk9t53twg5sa6rnxd7nyynt4uq0adypga", "x": 2332.618268567737, "y": 1623.3575922573884}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zssupw844nf6p7jl48lrzd2d03rc70kwpd23cwn", "id": 3193, "label": "pc1zssupw844nf6p7jl48lrzd2d03rc70kwpd23cwn, Receive from \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1zssupw844nf6p7jl48lrzd2d03rc70kwpd23cwn", "x": 374.2709125226079, "y": 1493.8565595065372}, {"color": "#8768d8", "customUrl": "https://pacviewer.com/address/pc1pd53kngms9tvrjzrrqxuyukr0z67lusm3yx9wvd", "id": 3194, "label": "pc1pd53kngms9tvrjzrrqxuyukr0z67lusm3yx9wvd", "shape": "square", "title": "pc1pd53kngms9tvrjzrrqxuyukr0z67lusm3yx9wvd", "x": -1290.475646693002, "y": 2533.830692880363}, {"color": "#8768d8", "customUrl": "https://pacviewer.com/address/pc1px72cnd8thdc2fwejm33fu4mcu6w0x47xke2q98", "id": 3195, "label": "pc1px72cnd8thdc2fwejm33fu4mcu6w0x47xke2q98", "shape": "square", "title": "pc1px72cnd8thdc2fwejm33fu4mcu6w0x47xke2q98", "x": 869.0779952535571, "y": 3465.8157817620777}, {"color": "#8768d8", "customUrl": "https://pacviewer.com/address/pc1zj3kzmr4j3fxgcas4m5q249t6qe0mnmugxdlggu", "id": 1886, "label": "pc1zj3kzmr4j3fxgcas4m5q249t6qe0mnmugxdlggu", "shape": "dot", "title": "pc1zj3kzmr4j3fxgcas4m5q249t6qe0mnmugxdlggu", "x": -793.7063392715035, "y": -3166.2120117387726}, {"color": "#8768d8", "customUrl": "https://pacviewer.com/address/pc1p8nxgpwnx3ugsx2urm7jeqcd94wv69u2a3zg9p4", "id": 1887, "label": "pc1p8nxgpwnx3ugsx2urm7jeqcd94wv69u2a3zg9p4", "shape": "square", "title": "pc1p8nxgpwnx3ugsx2urm7jeqcd94wv69u2a3zg9p4", "x": -1253.1767294552872, "y": -5000.0}]);
                  edges = new vis.DataSet([{"color": "#8768d8", "from": 1888, "label": "17.0", "to": 1886, "value": 17.0}, {"color": "#8768d8", "from": 1888, "label": "125.0", "to": 3193, "value": 125.0}, {"color": "#8768d8", "from": 2528, "label": "100.0", "to": 3193, "value": 100.0}, {"color": "#8768d8", "from": 3193, "label": "1120.03", "to": 3194, "value": 1120.03}, {"color": "#8768d8", "from": 3193, "label": "524.06", "to": 3195, "value": 524.06}, {"color": "#8768d8", "from": 1886, "label": "729.02", "to": 1887, "value": 729.02}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
