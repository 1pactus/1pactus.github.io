        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var network;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zj26vyucqfd9hw40l4dgl63p960c0j6lw2gltt7", "id": 4736, "label": "pc1zj26vyucqfd9hw40l4dgl63p960c0j6lw2gltt7, Send to \u0027Coinstore Exchange\u0027", "shape": "triangle", "title": "pc1zj26vyucqfd9hw40l4dgl63p960c0j6lw2gltt7", "x": -721.6724245378945, "y": 271.8780381327549}, {"color": "#969879", "customUrl": "https://pacviewer.com/address/pc1zhpp3jlxhsxy4lfrkg2x0pax6l5mlspquapqlw8", "id": 4737, "label": "pc1zhpp3jlxhsxy4lfrkg2x0pax6l5mlspquapqlw8", "shape": "dot", "title": "pc1zhpp3jlxhsxy4lfrkg2x0pax6l5mlspquapqlw8", "x": 1736.9718543981623, "y": -654.3751486250513}, {"color": "#969879", "customUrl": "https://pacviewer.com/address/pc1pg38l6szq3ptyq5jg29v2zq5z0e7k8k9xypkah9", "id": 4738, "label": "pc1pg38l6szq3ptyq5jg29v2zq5z0e7k8k9xypkah9", "shape": "square", "title": "pc1pg38l6szq3ptyq5jg29v2zq5z0e7k8k9xypkah9", "x": -3034.7620771510447, "y": 1143.295949355185}, {"color": "#969879", "customUrl": "https://pacviewer.com/address/pc1r6h5pphlpcvfp7tzmdn7qal2dpq5wmu0068yjaq", "id": 5200, "label": "pc1r6h5pphlpcvfp7tzmdn7qal2dpq5wmu0068yjaq", "shape": "dot", "title": "pc1r6h5pphlpcvfp7tzmdn7qal2dpq5wmu0068yjaq", "x": 3244.1755582717487, "y": -2027.1232823014648}, {"color": "#969879", "customUrl": "https://pacviewer.com/address/pc1psmwg6hr23634vagrrhart5gzdlpzjknsu6jzts", "id": 5201, "label": "pc1psmwg6hr23634vagrrhart5gzdlpzjknsu6jzts", "shape": "square", "title": "pc1psmwg6hr23634vagrrhart5gzdlpzjknsu6jzts", "x": 3775.287089019028, "y": -617.3420850895543}, {"color": "#969879", "customUrl": "https://pacviewer.com/address/pc1r54tdpg2whp0qe95yq9p6xp3x3y2kxst8kddmkk", "id": 6172, "label": "pc1r54tdpg2whp0qe95yq9p6xp3x3y2kxst8kddmkk", "shape": "dot", "title": "pc1r54tdpg2whp0qe95yq9p6xp3x3y2kxst8kddmkk", "x": -5000.0, "y": 1883.6665285281308}]);
                  edges = new vis.DataSet([{"color": "#969879", "from": 4736, "label": "1.0", "to": 4737, "value": 1.0}, {"color": "#969879", "from": 4736, "label": "3.0", "to": 4738, "value": 3.0}, {"color": "#969879", "from": 4737, "label": "843.6", "to": 5200, "value": 843.6}, {"color": "#969879", "from": 4737, "label": "147.31", "to": 5201, "value": 147.31}, {"color": "#969879", "from": 4738, "label": "79.12", "to": 6172, "value": 79.12}, {"color": "#969879", "from": 5200, "label": "112.71", "to": 5201, "value": 112.71}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
