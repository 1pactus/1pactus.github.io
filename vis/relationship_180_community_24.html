        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#2baa91", "customUrl": "https://pacviewer.com/address/pc1pg6mx3fk9t53twg5sa6rnxd7nyynt4uq0adypga", "id": 5834, "label": "pc1pg6mx3fk9t53twg5sa6rnxd7nyynt4uq0adypga", "shape": "square", "title": "pc1pg6mx3fk9t53twg5sa6rnxd7nyynt4uq0adypga", "x": 2270.4006054189013, "y": 2196.490901503421}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zssupw844nf6p7jl48lrzd2d03rc70kwpd23cwn", "id": 922, "label": "pc1zssupw844nf6p7jl48lrzd2d03rc70kwpd23cwn, Receive from \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1zssupw844nf6p7jl48lrzd2d03rc70kwpd23cwn", "x": 869.9396894102689, "y": -275.5570979928397}, {"color": "#2baa91", "customUrl": "https://pacviewer.com/address/pc1pd53kngms9tvrjzrrqxuyukr0z67lusm3yx9wvd", "id": 923, "label": "pc1pd53kngms9tvrjzrrqxuyukr0z67lusm3yx9wvd", "shape": "square", "title": "pc1pd53kngms9tvrjzrrqxuyukr0z67lusm3yx9wvd", "x": 582.5938678464457, "y": -3101.2984328820185}, {"color": "#2baa91", "customUrl": "https://pacviewer.com/address/pc1zj3kzmr4j3fxgcas4m5q249t6qe0mnmugxdlggu", "id": 924, "label": "pc1zj3kzmr4j3fxgcas4m5q249t6qe0mnmugxdlggu", "shape": "dot", "title": "pc1zj3kzmr4j3fxgcas4m5q249t6qe0mnmugxdlggu", "x": -2355.722868628554, "y": 748.129989189483}, {"color": "#2baa91", "customUrl": "https://pacviewer.com/address/pc1px72cnd8thdc2fwejm33fu4mcu6w0x47xke2q98", "id": 925, "label": "pc1px72cnd8thdc2fwejm33fu4mcu6w0x47xke2q98", "shape": "square", "title": "pc1px72cnd8thdc2fwejm33fu4mcu6w0x47xke2q98", "x": 3632.7887059529376, "y": -1155.2601510337558}, {"color": "#2baa91", "customUrl": "https://pacviewer.com/address/pc1p8nxgpwnx3ugsx2urm7jeqcd94wv69u2a3zg9p4", "id": 1755, "label": "pc1p8nxgpwnx3ugsx2urm7jeqcd94wv69u2a3zg9p4", "shape": "square", "title": "pc1p8nxgpwnx3ugsx2urm7jeqcd94wv69u2a3zg9p4", "x": -5000.0, "y": 1587.49479121571}]);
                  edges = new vis.DataSet([{"color": "#2baa91", "from": 5834, "label": "100.0", "to": 922, "value": 100.0}, {"color": "#2baa91", "from": 922, "label": "1043.01", "to": 923, "value": 1043.01}, {"color": "#2baa91", "from": 922, "label": "15.0", "to": 924, "value": 15.0}, {"color": "#2baa91", "from": 922, "label": "517.03", "to": 925, "value": 517.03}, {"color": "#2baa91", "from": 924, "label": "747.02", "to": 1755, "value": 747.02}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
