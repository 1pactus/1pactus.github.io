        <script type="text/javascript">

              // initialize global variables.

              var nodeColors;

              var network;
              var container;
              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1zwayqpwugfqng6cdrd53mzndwq57s95qme3lx34", "id": 2752, "label": "pc1zwayqpwugfqng6cdrd53mzndwq57s95qme3lx34", "shape": "dot", "title": "pc1zwayqpwugfqng6cdrd53mzndwq57s95qme3lx34", "x": 620.318801742244, "y": 3720.8247481697013}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1p4gn9dsazjml3dwyft3k4zs53gwr2ukahvrjt8y", "id": 3172, "label": "pc1p4gn9dsazjml3dwyft3k4zs53gwr2ukahvrjt8y", "shape": "square", "title": "pc1p4gn9dsazjml3dwyft3k4zs53gwr2ukahvrjt8y", "x": 1237.186954158788, "y": -5000.0}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1zsmykqv40at9na285gnwxcnrfg0whgxgwg70v3n", "id": 2662, "label": "pc1zsmykqv40at9na285gnwxcnrfg0whgxgwg70v3n", "shape": "dot", "title": "pc1zsmykqv40at9na285gnwxcnrfg0whgxgwg70v3n", "x": 153.72789982602208, "y": -621.2908568958876}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1r4mex8rhwfuate6hdgwwf7g92awedggvdpncafy", "id": 2663, "label": "pc1r4mex8rhwfuate6hdgwwf7g92awedggvdpncafy", "shape": "dot", "title": "pc1r4mex8rhwfuate6hdgwwf7g92awedggvdpncafy", "x": 740.0922234186381, "y": -2991.035511852156}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1r3kdux97n890exmhv4089vtw7lqd5pf698nns9d", "id": 2664, "label": "pc1r3kdux97n890exmhv4089vtw7lqd5pf698nns9d", "shape": "dot", "title": "pc1r3kdux97n890exmhv4089vtw7lqd5pf698nns9d", "x": -467.4760473085888, "y": 1889.26306160446}, {"color": "#8c847b", "customUrl": "https://pacviewer.com/address/pc1z4dutck6dk4cn4jv05659vsezg9duta09y3m5pt", "id": 2750, "label": "pc1z4dutck6dk4cn4jv05659vsezg9duta09y3m5pt", "shape": "dot", "title": "pc1z4dutck6dk4cn4jv05659vsezg9duta09y3m5pt", "x": -2283.8498318371035, "y": 3002.2385589738815}]);
                  edges = new vis.DataSet([{"color": "#8c847b", "from": 2752, "label": "220.0", "to": 2664, "value": 220.0}, {"color": "#8c847b", "from": 3172, "label": "77.01", "to": 2663, "value": 77.01}, {"color": "#8c847b", "from": 2662, "label": "5.0", "to": 2663, "value": 5.0}, {"color": "#8c847b", "from": 2662, "label": "173.0", "to": 2664, "value": 173.0}, {"color": "#8c847b", "from": 2664, "label": "236.0", "to": 2750, "value": 236.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
