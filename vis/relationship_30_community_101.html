        <script type="text/javascript">

              function drawGraph() {

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "id": 2082, "label": "pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "shape": "dot", "title": "pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "x": 0.7492943582594895, "y": 1.3685110154282}, {"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1r98h8cqupel4sweglv8t7awnpqa5laf4qdn5zle", "id": 2083, "label": "pc1r98h8cqupel4sweglv8t7awnpqa5laf4qdn5zle", "shape": "dot", "title": "pc1r98h8cqupel4sweglv8t7awnpqa5laf4qdn5zle", "x": 4520.074195647787, "y": -2273.078856058627}, {"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1rcara0h62w3z4gst4df4fst3pld6vuleqadfkgk", "id": 2084, "label": "pc1rcara0h62w3z4gst4df4fst3pld6vuleqadfkgk", "shape": "dot", "title": "pc1rcara0h62w3z4gst4df4fst3pld6vuleqadfkgk", "x": -763.8720934493388, "y": -5000.0}, {"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1rcu7ku538eepsunzg4n3r9qal0w5786cp38md8m", "id": 2085, "label": "pc1rcu7ku538eepsunzg4n3r9qal0w5786cp38md8m", "shape": "dot", "title": "pc1rcu7ku538eepsunzg4n3r9qal0w5786cp38md8m", "x": -4993.009016416194, "y": -819.945149463196}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1rxhyed6rcs8wvtf6cagume0z9umpxmdw2chlgjx", "id": 2086, "label": "pc1rxhyed6rcs8wvtf6cagume0z9umpxmdw2chlgjx, Send to \u0027Wrapto Lock\u0027", "shape": "triangle", "title": "pc1rxhyed6rcs8wvtf6cagume0z9umpxmdw2chlgjx", "x": 3558.526958869404, "y": 3597.2226300757275}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1rzl570djcqp6fvw9lfdmq8rar0dtuksantdl3ur", "id": 2087, "label": "pc1rzl570djcqp6fvw9lfdmq8rar0dtuksantdl3ur, Send to \u0027Wrapto Lock\u0027", "shape": "triangle", "title": "pc1rzl570djcqp6fvw9lfdmq8rar0dtuksantdl3ur", "x": -2322.4693390099187, "y": 4494.432864430668}]);
                  edges = new vis.DataSet([{"color": "#1ac4a6", "from": 2082, "label": "255.5", "to": 2083, "value": 255.5}, {"color": "#1ac4a6", "from": 2082, "label": "98.5", "to": 2084, "value": 98.5}, {"color": "#1ac4a6", "from": 2082, "label": "77.25", "to": 2085, "value": 77.25}, {"color": "#1ac4a6", "from": 2082, "label": "345.5", "to": 2086, "value": 345.5}, {"color": "#1ac4a6", "from": 2082, "label": "83.0", "to": 2087, "value": 83.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;
