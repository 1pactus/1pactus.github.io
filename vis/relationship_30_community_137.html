        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#c948a7", "customUrl": "https://pacviewer.com/address/pc1rkzfj0drhtcyakelcups3uml932n2p2rk248x55", "id": 1960, "label": "pc1rkzfj0drhtcyakelcups3uml932n2p2rk248x55", "shape": "dot", "title": "pc1rkzfj0drhtcyakelcups3uml932n2p2rk248x55", "x": 1025.866845144351, "y": -2477.7629495168053}, {"color": "#c948a7", "customUrl": "https://pacviewer.com/address/pc1zj7jecacv09z0yh274cvkyn6w6hrpx2wez8j3f3", "id": 3305, "label": "pc1zj7jecacv09z0yh274cvkyn6w6hrpx2wez8j3f3", "shape": "dot", "title": "pc1zj7jecacv09z0yh274cvkyn6w6hrpx2wez8j3f3", "x": -441.7168543086387, "y": -100.34292975456152}, {"color": "#c948a7", "customUrl": "https://pacviewer.com/address/pc1phgy6v3msjvmanm9kdxxtk0egse7sgglrv5af4a", "id": 1961, "label": "pc1phgy6v3msjvmanm9kdxxtk0egse7sgglrv5af4a", "shape": "square", "title": "pc1phgy6v3msjvmanm9kdxxtk0egse7sgglrv5af4a", "x": 2215.5534965292245, "y": -4484.105091357593}, {"color": "#c948a7", "customUrl": "https://pacviewer.com/address/pc1plqvrzgpgmg27rumv7uuven3jd6yjqwtjqapf2k", "id": 3306, "label": "pc1plqvrzgpgmg27rumv7uuven3jd6yjqwtjqapf2k", "shape": "square", "title": "pc1plqvrzgpgmg27rumv7uuven3jd6yjqwtjqapf2k", "x": -2719.9395880035063, "y": -613.7257136480719}, {"color": "#c948a7", "customUrl": "https://pacviewer.com/address/pc1re367s5tyr98rx26n7veh05u57uwqmxv269wrgv", "id": 1975, "label": "pc1re367s5tyr98rx26n7veh05u57uwqmxv269wrgv", "shape": "dot", "title": "pc1re367s5tyr98rx26n7veh05u57uwqmxv269wrgv", "x": -143.05382349026934, "y": 2675.9366842770332}, {"color": "#c948a7", "customUrl": "https://pacviewer.com/address/pc1pzfzrgxzf7x5q40lsrey0tq3mqh5zy0ups02fyz", "id": 1976, "label": "pc1pzfzrgxzf7x5q40lsrey0tq3mqh5zy0ups02fyz", "shape": "square", "title": "pc1pzfzrgxzf7x5q40lsrey0tq3mqh5zy0ups02fyz", "x": 63.28992412883823, "y": 5000.0}]);
                  edges = new vis.DataSet([{"color": "#c948a7", "from": 1960, "label": "1037.0", "to": 1961, "value": 1037.0}, {"color": "#c948a7", "from": 1960, "label": "1001.0", "to": 3305, "value": 1001.0}, {"color": "#c948a7", "from": 3305, "label": "987.0", "to": 1975, "value": 987.0}, {"color": "#c948a7", "from": 3305, "label": "110.0", "to": 3306, "value": 110.0}, {"color": "#c948a7", "from": 1975, "label": "996.0", "to": 1976, "value": 996.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
