        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var nodeColors;

              var network;

              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1zpg2n2kmfn3wm848mckpzpqy26phn7jsyfr6w2z", "id": 6378, "label": "pc1zpg2n2kmfn3wm848mckpzpqy26phn7jsyfr6w2z", "shape": "dot", "title": "pc1zpg2n2kmfn3wm848mckpzpqy26phn7jsyfr6w2z", "x": 684.6265211060595, "y": 3857.233436858349}, {"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1rwxgfyqcl6v3hnn70ldx6994jvquwpd4m9nn4e3", "id": 6379, "label": "pc1rwxgfyqcl6v3hnn70ldx6994jvquwpd4m9nn4e3", "shape": "dot", "title": "pc1rwxgfyqcl6v3hnn70ldx6994jvquwpd4m9nn4e3", "x": -622.2864639995693, "y": 55.49933470049198}, {"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1p0pkfvrmujegrd2m2ps7c3cpndr7lud4zfpd3f8", "id": 6380, "label": "pc1p0pkfvrmujegrd2m2ps7c3cpndr7lud4zfpd3f8", "shape": "square", "title": "pc1p0pkfvrmujegrd2m2ps7c3cpndr7lud4zfpd3f8", "x": 2620.863506668262, "y": 1448.8617154099165}, {"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1zzvaejh98tw6m60k3w6j8tkezm7er3kv0dffc4p", "id": 6381, "label": "pc1zzvaejh98tw6m60k3w6j8tkezm7er3kv0dffc4p", "shape": "dot", "title": "pc1zzvaejh98tw6m60k3w6j8tkezm7er3kv0dffc4p", "x": 2323.4241850236676, "y": -1886.8281689028265}, {"color": "#1ac4a6", "customUrl": "https://pacviewer.com/address/pc1pzdygn657xzujh2532nf5p2adcxrzgs6t0s0h0z", "id": 6382, "label": "pc1pzdygn657xzujh2532nf5p2adcxrzgs6t0s0h0z", "shape": "square", "title": "pc1pzdygn657xzujh2532nf5p2adcxrzgs6t0s0h0z", "x": -6.62774879842009, "y": -3917.8455509787623}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zg5up5w3jmzs8dlyc3eknchs5x7cvqunc0tcgdl", "id": 6419, "label": "pc1zg5up5w3jmzs8dlyc3eknchs5x7cvqunc0tcgdl, Send to \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1zg5up5w3jmzs8dlyc3eknchs5x7cvqunc0tcgdl", "x": -5000.0, "y": 443.07923291283254}]);
                  edges = new vis.DataSet([{"color": "#1ac4a6", "from": 6378, "label": "363.3", "to": 6379, "value": 363.3}, {"color": "#1ac4a6", "from": 6378, "label": "204.07", "to": 6380, "value": 204.07}, {"color": "#1ac4a6", "from": 6379, "label": "564.8", "to": 6381, "value": 564.8}, {"color": "#1ac4a6", "from": 6379, "label": "1129.0", "to": 6419, "value": 1129.0}, {"color": "#1ac4a6", "from": 6379, "label": "365.04", "to": 6380, "value": 365.04}, {"color": "#1ac4a6", "from": 6379, "label": "346.03", "to": 6382, "value": 346.03}, {"color": "#1ac4a6", "from": 6380, "label": "97.01", "to": 6381, "value": 97.01}, {"color": "#1ac4a6", "from": 6381, "label": "352.11", "to": 6382, "value": 352.11}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
