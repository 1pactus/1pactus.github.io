        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#799e50", "customUrl": "https://pacviewer.com/address/pc1z69y0fh7y4przy8pg42c4exvlnzk8gw0szwwhs7", "id": 6403, "label": "pc1z69y0fh7y4przy8pg42c4exvlnzk8gw0szwwhs7", "shape": "dot", "title": "pc1z69y0fh7y4przy8pg42c4exvlnzk8gw0szwwhs7", "x": -49.95912234114127, "y": 5000.0}, {"color": "#799e50", "customUrl": "https://pacviewer.com/address/pc1pssda0x090tthwmv7nc285p5n93kwtdekzp3l22", "id": 3001, "label": "pc1pssda0x090tthwmv7nc285p5n93kwtdekzp3l22", "shape": "square", "title": "pc1pssda0x090tthwmv7nc285p5n93kwtdekzp3l22", "x": 2320.2655971234244, "y": -4428.604373070901}, {"color": "#799e50", "customUrl": "https://pacviewer.com/address/pc1zjujh9wgu0r3sd45u97s3jlzalm7dfgwf7u7cgr", "id": 1692, "label": "pc1zjujh9wgu0r3sd45u97s3jlzalm7dfgwf7u7cgr", "shape": "dot", "title": "pc1zjujh9wgu0r3sd45u97s3jlzalm7dfgwf7u7cgr", "x": -441.1103980071344, "y": -111.06368973733694}, {"color": "#799e50", "customUrl": "https://pacviewer.com/address/pc1pwsf2jmm2gtm3jmctnz34f4gmltqv4wdcathna2", "id": 1693, "label": "pc1pwsf2jmm2gtm3jmctnz34f4gmltqv4wdcathna2", "shape": "square", "title": "pc1pwsf2jmm2gtm3jmctnz34f4gmltqv4wdcathna2", "x": -2706.488820533341, "y": -682.6087337451609}, {"color": "#799e50", "customUrl": "https://pacviewer.com/address/pc1pmwf4senx7we872k0cu2fc7gly65u0ydp9vr7ye", "id": 1694, "label": "pc1pmwf4senx7we872k0cu2fc7gly65u0ydp9vr7ye", "shape": "square", "title": "pc1pmwf4senx7we872k0cu2fc7gly65u0ydp9vr7ye", "x": -204.99428140599198, "y": 2673.044393105457}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zjvkm4wec047rnxjuykjnvm447mx9gcp8jj7h4z", "id": 1695, "label": "pc1zjvkm4wec047rnxjuykjnvm447mx9gcp8jj7h4z, Receive from \u0027Pagu\u0027", "shape": "triangle", "title": "pc1zjvkm4wec047rnxjuykjnvm447mx9gcp8jj7h4z", "x": 1082.2870251641841, "y": -2450.767596552059}]);
                  edges = new vis.DataSet([{"color": "#799e50", "from": 6403, "label": "1.0", "to": 1694, "value": 1.0}, {"color": "#799e50", "from": 3001, "label": "584.02", "to": 1695, "value": 584.02}, {"color": "#799e50", "from": 1692, "label": "943.26", "to": 1693, "value": 943.26}, {"color": "#799e50", "from": 1692, "label": "8.0", "to": 1694, "value": 8.0}, {"color": "#799e50", "from": 1692, "label": "316.1", "to": 1695, "value": 316.1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
