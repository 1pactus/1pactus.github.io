        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',

              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#3daa29", "customUrl": "https://pacviewer.com/address/pc1ryvhdfy2a83046cemr9hcu7lz7fzfq0r3as3wh2", "id": 5027, "label": "pc1ryvhdfy2a83046cemr9hcu7lz7fzfq0r3as3wh2", "shape": "dot", "title": "pc1ryvhdfy2a83046cemr9hcu7lz7fzfq0r3as3wh2", "x": -2713.30453183885, "y": 2444.6031367402416}, {"color": "#3daa29", "customUrl": "https://pacviewer.com/address/pc1rvexgjx5nkgxulldrcgfhd8w6yn0qmdlw5shp39", "id": 4998, "label": "pc1rvexgjx5nkgxulldrcgfhd8w6yn0qmdlw5shp39", "shape": "dot", "title": "pc1rvexgjx5nkgxulldrcgfhd8w6yn0qmdlw5shp39", "x": 281.60172744117017, "y": -1890.2941116564587}, {"color": "#3daa29", "customUrl": "https://pacviewer.com/address/pc1rxw9ahkx77vt8mgecau90s3xm8cuzqmsp7s6yra", "id": 4999, "label": "pc1rxw9ahkx77vt8mgecau90s3xm8cuzqmsp7s6yra", "shape": "dot", "title": "pc1rxw9ahkx77vt8mgecau90s3xm8cuzqmsp7s6yra", "x": 2120.5800536654283, "y": -659.1873161046117}, {"color": "#3daa29", "customUrl": "https://pacviewer.com/address/pc1r3ssxsvxgxs827pz8dkvytqxgdffazlthyshp0g", "id": 5000, "label": "pc1r3ssxsvxgxs827pz8dkvytqxgdffazlthyshp0g", "shape": "dot", "title": "pc1r3ssxsvxgxs827pz8dkvytqxgdffazlthyshp0g", "x": -3714.8770506677783, "y": 791.1911986467472}, {"color": "#3daa29", "customUrl": "https://pacviewer.com/address/pc1re8jhn8mlnedcp9j5kzukweeau0a3gnmecjzxyr", "id": 5005, "label": "pc1re8jhn8mlnedcp9j5kzukweeau0a3gnmecjzxyr", "shape": "dot", "title": "pc1re8jhn8mlnedcp9j5kzukweeau0a3gnmecjzxyr", "x": 5000.0, "y": -971.2456503015237}, {"color": "#3daa29", "customUrl": "https://pacviewer.com/address/pc1r0w92q7faqzhqrkdnrp5tdkrgvx6v5tgdsr00vx", "id": 4922, "label": "pc1r0w92q7faqzhqrkdnrp5tdkrgvx6v5tgdsr00vx", "shape": "dot", "title": "pc1r0w92q7faqzhqrkdnrp5tdkrgvx6v5tgdsr00vx", "x": -974.0001985999709, "y": 284.93274267560497}]);
                  edges = new vis.DataSet([{"color": "#3daa29", "from": 5027, "label": "1.09", "to": 5000, "value": 1.09}, {"color": "#3daa29", "from": 5027, "label": "1.0", "to": 4922, "value": 1.0}, {"color": "#3daa29", "from": 4998, "label": "8.463325556", "to": 4922, "value": 8.463325556}, {"color": "#3daa29", "from": 4998, "label": "8.423325556", "to": 4999, "value": 8.423325556}, {"color": "#3daa29", "from": 4999, "label": "6.772325556", "to": 4922, "value": 6.772325556}, {"color": "#3daa29", "from": 4999, "label": "0.001", "to": 5005, "value": 0.001}, {"color": "#3daa29", "from": 4999, "label": "0.002", "to": 4999, "value": 0.002}, {"color": "#3daa29", "from": 5000, "label": "1.1", "to": 4922, "value": 1.1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
