        <script type="text/javascript">

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#eaf80a", "customUrl": "https://pacviewer.com/address/pc1plaj28ns4h55jtdwjs9n5mjap2rnef3zqh23wue", "id": 6817, "label": "pc1plaj28ns4h55jtdwjs9n5mjap2rnef3zqh23wue", "shape": "square", "title": "pc1plaj28ns4h55jtdwjs9n5mjap2rnef3zqh23wue", "x": -209.40037897662575, "y": 5000.0}, {"color": "#eaf80a", "customUrl": "https://pacviewer.com/address/pc1z42szllcmng3yus8qzsrlq3ececp8hlx5azkltp", "id": 1252, "label": "pc1z42szllcmng3yus8qzsrlq3ececp8hlx5azkltp", "shape": "dot", "title": "pc1z42szllcmng3yus8qzsrlq3ececp8hlx5azkltp", "x": -128.59037719006702, "y": -7.744244884444785}, {"color": "#eaf80a", "customUrl": "https://pacviewer.com/address/pc1rxjm8qha2wyvk9usdtl9ctteawalrrkzyfw8ale", "id": 1253, "label": "pc1rxjm8qha2wyvk9usdtl9ctteawalrrkzyfw8ale", "shape": "dot", "title": "pc1rxjm8qha2wyvk9usdtl9ctteawalrrkzyfw8ale", "x": 4490.941665423658, "y": -1196.3726073968387}, {"color": "#eaf80a", "customUrl": "https://pacviewer.com/address/pc1za37nn8hyd3jkpvjrge6upju6aklrthezwkp20l", "id": 5720, "label": "pc1za37nn8hyd3jkpvjrge6upju6aklrthezwkp20l", "shape": "dot", "title": "pc1za37nn8hyd3jkpvjrge6upju6aklrthezwkp20l", "x": -4275.805014336692, "y": -2780.657966258031}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1z8zp9gxhadmx6kj87gayvgrh28gx73wxvyexrey", "id": 5714, "label": "pc1z8zp9gxhadmx6kj87gayvgrh28gx73wxvyexrey, Send to \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1z8zp9gxhadmx6kj87gayvgrh28gx73wxvyexrey", "x": 4332.473643557656, "y": 1689.0479923621153}, {"color": "#eaf80a", "customUrl": "https://pacviewer.com/address/pc1p8necm4qguw5gctz720tvrxjudauy86nje4qtmx", "id": 6808, "label": "pc1p8necm4qguw5gctz720tvrxjudauy86nje4qtmx", "shape": "square", "title": "pc1p8necm4qguw5gctz720tvrxjudauy86nje4qtmx", "x": -4555.190057624444, "y": 2289.6836042081945}, {"color": "#eaf80a", "customUrl": "https://pacviewer.com/address/pc1pa9248f4g4dpuggmxp6eq7rqpzpkyy0t45lqrrg", "id": 6809, "label": "pc1pa9248f4g4dpuggmxp6eq7rqpzpkyy0t45lqrrg", "shape": "square", "title": "pc1pa9248f4g4dpuggmxp6eq7rqpzpkyy0t45lqrrg", "x": 345.5705191465136, "y": -4993.956778030997}]);
                  edges = new vis.DataSet([{"color": "#eaf80a", "from": 6817, "label": "999.98", "to": 1252, "value": 999.98}, {"color": "#eaf80a", "from": 1252, "label": "9305.0", "to": 5714, "value": 9305.0}, {"color": "#eaf80a", "from": 1252, "label": "14000.3", "to": 1253, "value": 14000.3}, {"color": "#eaf80a", "from": 1252, "label": "1.99", "to": 5720, "value": 1.99}, {"color": "#eaf80a", "from": 1252, "label": "999.98", "to": 6808, "value": 999.98}, {"color": "#eaf80a", "from": 1252, "label": "499.98", "to": 6809, "value": 499.98}, {"color": "#eaf80a", "from": 1253, "label": "14599.0", "to": 5714, "value": 14599.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
