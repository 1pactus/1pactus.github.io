        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network

                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zj26vyucqfd9hw40l4dgl63p960c0j6lw2gltt7", "id": 4792, "label": "pc1zj26vyucqfd9hw40l4dgl63p960c0j6lw2gltt7, Send to \u0027Coinstore Exchange\u0027", "shape": "triangle", "title": "pc1zj26vyucqfd9hw40l4dgl63p960c0j6lw2gltt7", "x": 164.0196173207711, "y": 721.4568186360182}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1zhpp3jlxhsxy4lfrkg2x0pax6l5mlspquapqlw8", "id": 4793, "label": "pc1zhpp3jlxhsxy4lfrkg2x0pax6l5mlspquapqlw8", "shape": "dot", "title": "pc1zhpp3jlxhsxy4lfrkg2x0pax6l5mlspquapqlw8", "x": -394.9167170952997, "y": -1737.0809698920784}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1r6h5pphlpcvfp7tzmdn7qal2dpq5wmu0068yjaq", "id": 5242, "label": "pc1r6h5pphlpcvfp7tzmdn7qal2dpq5wmu0068yjaq", "shape": "dot", "title": "pc1r6h5pphlpcvfp7tzmdn7qal2dpq5wmu0068yjaq", "x": -93.27910146294104, "y": -3669.9339887026995}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1psmwg6hr23634vagrrhart5gzdlpzjknsu6jzts", "id": 5243, "label": "pc1psmwg6hr23634vagrrhart5gzdlpzjknsu6jzts", "shape": "square", "title": "pc1psmwg6hr23634vagrrhart5gzdlpzjknsu6jzts", "x": -1502.563433634487, "y": -3349.5402083933395}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1pg38l6szq3ptyq5jg29v2zq5z0e7k8k9xypkah9", "id": 4794, "label": "pc1pg38l6szq3ptyq5jg29v2zq5z0e7k8k9xypkah9", "shape": "square", "title": "pc1pg38l6szq3ptyq5jg29v2zq5z0e7k8k9xypkah9", "x": 690.0145091259069, "y": 3035.0983483520986}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1r54tdpg2whp0qe95yq9p6xp3x3y2kxst8kddmkk", "id": 6201, "label": "pc1r54tdpg2whp0qe95yq9p6xp3x3y2kxst8kddmkk", "shape": "dot", "title": "pc1r54tdpg2whp0qe95yq9p6xp3x3y2kxst8kddmkk", "x": 1136.7251257460496, "y": 5000.0}]);
                  edges = new vis.DataSet([{"color": "#1dc625", "from": 4792, "label": "1.0", "to": 4793, "value": 1.0}, {"color": "#1dc625", "from": 4792, "label": "33.0", "to": 4794, "value": 33.0}, {"color": "#1dc625", "from": 4793, "label": "843.6", "to": 5242, "value": 843.6}, {"color": "#1dc625", "from": 4793, "label": "179.31", "to": 5243, "value": 179.31}, {"color": "#1dc625", "from": 5242, "label": "91.01", "to": 5243, "value": 91.01}, {"color": "#1dc625", "from": 4794, "label": "79.12", "to": 6201, "value": 79.12}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;
