        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1zn86atr8hltyd3vq3dmmcq3e209jmuhf036sdlt", "id": 3873, "label": "pc1zn86atr8hltyd3vq3dmmcq3e209jmuhf036sdlt", "shape": "dot", "title": "pc1zn86atr8hltyd3vq3dmmcq3e209jmuhf036sdlt", "x": -113.10832855821948, "y": 629.1235697340785}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1p7nhzy5rdhzs60d7elp3nh2fkl5eh6fnukt0rjq", "id": 3874, "label": "pc1p7nhzy5rdhzs60d7elp3nh2fkl5eh6fnukt0rjq", "shape": "square", "title": "pc1p7nhzy5rdhzs60d7elp3nh2fkl5eh6fnukt0rjq", "x": 2482.528467699994, "y": 887.7424361272567}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1ppukqknqpsvc4znlvn2zzq97qcxes85dlqfav9m", "id": 3875, "label": "pc1ppukqknqpsvc4znlvn2zzq97qcxes85dlqfav9m", "shape": "square", "title": "pc1ppukqknqpsvc4znlvn2zzq97qcxes85dlqfav9m", "x": -2634.8380771156208, "y": -33.9940841607928}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1zf8kuw97wy5kgmxzp56aa66fc9cqrm9f25njyjw", "id": 3876, "label": "pc1zf8kuw97wy5kgmxzp56aa66fc9cqrm9f25njyjw", "shape": "dot", "title": "pc1zf8kuw97wy5kgmxzp56aa66fc9cqrm9f25njyjw", "x": -1328.021991059108, "y": 2871.0309982434746}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1phq5waepe5d5hv2rvwsy4ptuwd0dx3j7xy3aqe9", "id": 3877, "label": "pc1phq5waepe5d5hv2rvwsy4ptuwd0dx3j7xy3aqe9", "shape": "square", "title": "pc1phq5waepe5d5hv2rvwsy4ptuwd0dx3j7xy3aqe9", "x": 242.23899578180274, "y": 3155.2268071633193}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1z6775tk6qhrarce4geczhu8v8xp6tjmxnmw3h2h", "id": 5435, "label": "pc1z6775tk6qhrarce4geczhu8v8xp6tjmxnmw3h2h", "shape": "dot", "title": "pc1z6775tk6qhrarce4geczhu8v8xp6tjmxnmw3h2h", "x": 451.68743812355586, "y": -2509.129727107336}, {"color": "#1dc625", "customUrl": "https://pacviewer.com/address/pc1p524xxvml4446cxfkm3tr4kjkn3ap9c42sd395u", "id": 5436, "label": "pc1p524xxvml4446cxfkm3tr4kjkn3ap9c42sd395u", "shape": "square", "title": "pc1p524xxvml4446cxfkm3tr4kjkn3ap9c42sd395u", "x": 899.5134951275959, "y": -5000.0}]);
                  edges = new vis.DataSet([{"color": "#1dc625", "from": 3873, "label": "713.02", "to": 3874, "value": 713.02}, {"color": "#1dc625", "from": 3873, "label": "611.0", "to": 3875, "value": 611.0}, {"color": "#1dc625", "from": 3873, "label": "9.9", "to": 3876, "value": 9.9}, {"color": "#1dc625", "from": 3873, "label": "54.01", "to": 3877, "value": 54.01}, {"color": "#1dc625", "from": 3873, "label": "1520.0", "to": 5435, "value": 1520.0}, {"color": "#1dc625", "from": 3876, "label": "1000.0", "to": 3877, "value": 1000.0}, {"color": "#1dc625", "from": 5435, "label": "998.0", "to": 5436, "value": 998.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
