        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1zhx4l07dqgphy48mjv2ea853agjw3v89dq95hju", "id": 2401, "label": "pc1zhx4l07dqgphy48mjv2ea853agjw3v89dq95hju", "shape": "dot", "title": "pc1zhx4l07dqgphy48mjv2ea853agjw3v89dq95hju", "x": -513.0237148738333, "y": -1918.602279907553}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1pfph4k6tgckxef2z8rh40jmlgdpx2hp5dyujvwx", "id": 2402, "label": "pc1pfph4k6tgckxef2z8rh40jmlgdpx2hp5dyujvwx", "shape": "square", "title": "pc1pfph4k6tgckxef2z8rh40jmlgdpx2hp5dyujvwx", "x": 2717.1461051267547, "y": -1499.4492698403244}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1pmvfu5qpmaegtkj4wfm8hw65mj9za8gpkmqnxav", "id": 2403, "label": "pc1pmvfu5qpmaegtkj4wfm8hw65mj9za8gpkmqnxav", "shape": "square", "title": "pc1pmvfu5qpmaegtkj4wfm8hw65mj9za8gpkmqnxav", "x": -479.23619847567994, "y": 1928.755203635021}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1pvhfd9360knxr2zwd6er0fmh04jc6nnmjulhkcp", "id": 2404, "label": "pc1pvhfd9360knxr2zwd6er0fmh04jc6nnmjulhkcp", "shape": "square", "title": "pc1pvhfd9360knxr2zwd6er0fmh04jc6nnmjulhkcp", "x": -2277.414041902801, "y": -4958.537654903515}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1zlasxapslvey77jwjj20szh87cdtukk8trk64pk", "id": 2411, "label": "pc1zlasxapslvey77jwjj20szh87cdtukk8trk64pk", "shape": "dot", "title": "pc1zlasxapslvey77jwjj20szh87cdtukk8trk64pk", "x": 2742.8277261067337, "y": 1447.8340010163713}, {"color": "#17cd77", "customUrl": "https://pacviewer.com/address/pc1zvuxa3aa6c4f4w2cxzklar7c4f807q3kjetzk8m", "id": 3672, "label": "pc1zvuxa3aa6c4f4w2cxzklar7c4f807q3kjetzk8m", "shape": "dot", "title": "pc1zvuxa3aa6c4f4w2cxzklar7c4f807q3kjetzk8m", "x": -2190.299875981176, "y": 5000.0}]);
                  edges = new vis.DataSet([{"color": "#17cd77", "from": 2401, "label": "532.05", "to": 2402, "value": 532.05}, {"color": "#17cd77", "from": 2401, "label": "1078.04", "to": 2403, "value": 1078.04}, {"color": "#17cd77", "from": 2401, "label": "585.7", "to": 2404, "value": 585.7}, {"color": "#17cd77", "from": 2402, "label": "364.05", "to": 2411, "value": 364.05}, {"color": "#17cd77", "from": 2403, "label": "82.0", "to": 2411, "value": 82.0}, {"color": "#17cd77", "from": 2403, "label": "15.9", "to": 3672, "value": 15.9}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
