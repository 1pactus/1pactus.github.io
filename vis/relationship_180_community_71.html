        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {

              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zya64ykpjplnqmrqkzl3w660xrd5gl8ayjh4ahn", "id": 1839, "label": "pc1zya64ykpjplnqmrqkzl3w660xrd5gl8ayjh4ahn, Receive from \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1zya64ykpjplnqmrqkzl3w660xrd5gl8ayjh4ahn", "x": -81.23240198634544, "y": 512.8125526983489}, {"color": "#73b9a1", "customUrl": "https://pacviewer.com/address/pc1ph5j3aw68mgsyfwfwfe045uxvpjmrcc2vq8ygag", "id": 1840, "label": "pc1ph5j3aw68mgsyfwfwfe045uxvpjmrcc2vq8ygag", "shape": "square", "title": "pc1ph5j3aw68mgsyfwfwfe045uxvpjmrcc2vq8ygag", "x": 3822.0735680262533, "y": -2275.1727182198506}, {"color": "#73b9a1", "customUrl": "https://pacviewer.com/address/pc1pp0q3wgdns8qjjz93c5e5h78guwl298jdvj4f7e", "id": 1841, "label": "pc1pp0q3wgdns8qjjz93c5e5h78guwl298jdvj4f7e", "shape": "square", "title": "pc1pp0q3wgdns8qjjz93c5e5h78guwl298jdvj4f7e", "x": -2927.9908086937553, "y": -3348.6887708092713}, {"color": "#73b9a1", "customUrl": "https://pacviewer.com/address/pc1zjjaus405ujc0ngxu0c6d0m809jnfk0sh5xgc6c", "id": 1842, "label": "pc1zjjaus405ujc0ngxu0c6d0m809jnfk0sh5xgc6c", "shape": "dot", "title": "pc1zjjaus405ujc0ngxu0c6d0m809jnfk0sh5xgc6c", "x": -3975.225272162917, "y": 3960.675218769252}, {"color": "#73b9a1", "customUrl": "https://pacviewer.com/address/pc1z2uez0ur360ndkd0q4c8yjfqjvaxrgqf7ckvrdu", "id": 1843, "label": "pc1z2uez0ur360ndkd0q4c8yjfqjvaxrgqf7ckvrdu", "shape": "dot", "title": "pc1z2uez0ur360ndkd0q4c8yjfqjvaxrgqf7ckvrdu", "x": 2551.30691227416, "y": 5000.0}, {"color": "#73b9a1", "customUrl": "https://pacviewer.com/address/pc1z7ucacwzq35gzc5dvxn9n4z9l85nfhvevp3dl7k", "id": 1844, "label": "pc1z7ucacwzq35gzc5dvxn9n4z9l85nfhvevp3dl7k", "shape": "dot", "title": "pc1z7ucacwzq35gzc5dvxn9n4z9l85nfhvevp3dl7k", "x": 611.0680025426041, "y": -3849.626282438478}]);
                  edges = new vis.DataSet([{"color": "#73b9a1", "from": 1839, "label": "2.0", "to": 1840, "value": 2.0}, {"color": "#73b9a1", "from": 1839, "label": "1318.08", "to": 1841, "value": 1318.08}, {"color": "#73b9a1", "from": 1839, "label": "1.01", "to": 1842, "value": 1.01}, {"color": "#73b9a1", "from": 1839, "label": "1.0", "to": 1843, "value": 1.0}, {"color": "#73b9a1", "from": 1839, "label": "2.0", "to": 1839, "value": 2.0}, {"color": "#73b9a1", "from": 1839, "label": "0.19", "to": 1844, "value": 0.19}, {"color": "#73b9a1", "from": 1840, "label": "1.99", "to": 1844, "value": 1.99}, {"color": "#73b9a1", "from": 1841, "label": "206.1", "to": 1844, "value": 206.1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
