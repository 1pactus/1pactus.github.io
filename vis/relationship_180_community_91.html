        <script type="text/javascript">

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#5bc21f", "customUrl": "https://pacviewer.com/address/pc1z598v0qmezetzy2knv5n4wgzu74eyad0ujmejpu", "id": 2183, "label": "pc1z598v0qmezetzy2knv5n4wgzu74eyad0ujmejpu", "shape": "dot", "title": "pc1z598v0qmezetzy2knv5n4wgzu74eyad0ujmejpu", "x": -2858.7776992136373, "y": -941.8240935980726}, {"color": "#5bc21f", "customUrl": "https://pacviewer.com/address/pc1p3pdpc4m40hp2v236hvl53qn7mhmyewfds6es5l", "id": 2184, "label": "pc1p3pdpc4m40hp2v236hvl53qn7mhmyewfds6es5l", "shape": "square", "title": "pc1p3pdpc4m40hp2v236hvl53qn7mhmyewfds6es5l", "x": -1025.6710797822989, "y": 1631.029864525389}, {"color": "#5bc21f", "customUrl": "https://pacviewer.com/address/pc1p5uhchsuvsl6f2hdpcattezccqecjlhr9vcm84d", "id": 2185, "label": "pc1p5uhchsuvsl6f2hdpcattezccqecjlhr9vcm84d", "shape": "square", "title": "pc1p5uhchsuvsl6f2hdpcattezccqecjlhr9vcm84d", "x": -779.4597027986512, "y": -2903.6754369335454}, {"color": "#5bc21f", "customUrl": "https://pacviewer.com/address/pc1rp0sccvyjzy09hnf33ppdchfl2ylkgp3uwja6jd", "id": 4587, "label": "pc1rp0sccvyjzy09hnf33ppdchfl2ylkgp3uwja6jd", "shape": "dot", "title": "pc1rp0sccvyjzy09hnf33ppdchfl2ylkgp3uwja6jd", "x": 1688.3821149132643, "y": -932.0292421621218}, {"color": "#5bc21f", "customUrl": "https://pacviewer.com/address/pc1pupx4q46hypa8vlhmfuz7tlzlm6farymp2cfry6", "id": 4588, "label": "pc1pupx4q46hypa8vlhmfuz7tlzlm6farymp2cfry6", "shape": "square", "title": "pc1pupx4q46hypa8vlhmfuz7tlzlm6farymp2cfry6", "x": 5000.0, "y": -1745.2294566756352}, {"color": "#5bc21f", "customUrl": "https://pacviewer.com/address/pc1zxm8na226h2ssychx0g8u3m9lf9p7h5g9hns5qh", "id": 2703, "label": "pc1zxm8na226h2ssychx0g8u3m9lf9p7h5g9hns5qh", "shape": "dot", "title": "pc1zxm8na226h2ssychx0g8u3m9lf9p7h5g9hns5qh", "x": -2024.4736331186766, "y": 4891.728364843985}]);
                  edges = new vis.DataSet([{"color": "#5bc21f", "from": 2183, "label": "953.22", "to": 2184, "value": 953.22}, {"color": "#5bc21f", "from": 2183, "label": "468.18", "to": 2185, "value": 468.18}, {"color": "#5bc21f", "from": 2184, "label": "233.66", "to": 2703, "value": 233.66}, {"color": "#5bc21f", "from": 2184, "label": "116.01", "to": 4587, "value": 116.01}, {"color": "#5bc21f", "from": 2185, "label": "105.01", "to": 4587, "value": 105.01}, {"color": "#5bc21f", "from": 4587, "label": "217.0", "to": 4588, "value": 217.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
