        <script type="text/javascript">

              // initialize global variables.
              var edges;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#9a7257", "customUrl": "https://pacviewer.com/address/pc1px6aah2quplnnykkfdrr5cu8h76r5s68dwy0erg", "id": 3232, "label": "pc1px6aah2quplnnykkfdrr5cu8h76r5s68dwy0erg", "shape": "square", "title": "pc1px6aah2quplnnykkfdrr5cu8h76r5s68dwy0erg", "x": 1465.3117271690423, "y": 5000.0}, {"color": "#9a7257", "customUrl": "https://pacviewer.com/address/pc1zp05y7krj08zzs9ssw8qgklhhwrekl54yluv8g6", "id": 3233, "label": "pc1zp05y7krj08zzs9ssw8qgklhhwrekl54yluv8g6", "shape": "dot", "title": "pc1zp05y7krj08zzs9ssw8qgklhhwrekl54yluv8g6", "x": 3881.6452117969693, "y": -1415.9223986439451}, {"color": "#9a7257", "customUrl": "https://pacviewer.com/address/pc1pr4csvnsaccandjwqeznkrh9gk4rd787uxyxjkn", "id": 3234, "label": "pc1pr4csvnsaccandjwqeznkrh9gk4rd787uxyxjkn", "shape": "square", "title": "pc1pr4csvnsaccandjwqeznkrh9gk4rd787uxyxjkn", "x": -2093.843282684617, "y": -3560.874604734174}, {"color": "#9a7257", "customUrl": "https://pacviewer.com/address/pc1zqgphzhlnns4sqcrcrf6auaz3zc4xeevzkmzdvj", "id": 5910, "label": "pc1zqgphzhlnns4sqcrcrf6auaz3zc4xeevzkmzdvj", "shape": "dot", "title": "pc1zqgphzhlnns4sqcrcrf6auaz3zc4xeevzkmzdvj", "x": 1223.4059406405502, "y": -3408.3308661064307}, {"color": "#9a7257", "customUrl": "https://pacviewer.com/address/pc1zzrkx5s72rxaws4dktu5at5aajt4qshu2sqdhua", "id": 3230, "label": "pc1zzrkx5s72rxaws4dktu5at5aajt4qshu2sqdhua", "shape": "dot", "title": "pc1zzrkx5s72rxaws4dktu5at5aajt4qshu2sqdhua", "x": -163.94177629006316, "y": 455.6687672775656}, {"color": "#9a7257", "customUrl": "https://pacviewer.com/address/pc1ppm6r2dmg8mnxafml6vftjjq4c78llravtfr3st", "id": 3231, "label": "pc1ppm6r2dmg8mnxafml6vftjjq4c78llravtfr3st", "shape": "square", "title": "pc1ppm6r2dmg8mnxafml6vftjjq4c78llravtfr3st", "x": -4312.577820631881, "y": 2929.459102206983}]);
                  edges = new vis.DataSet([{"color": "#9a7257", "from": 3232, "label": "739.01", "to": 3230, "value": 739.01}, {"color": "#9a7257", "from": 3233, "label": "60.0", "to": 3230, "value": 60.0}, {"color": "#9a7257", "from": 3233, "label": "57.0", "to": 5910, "value": 57.0}, {"color": "#9a7257", "from": 3234, "label": "769.99", "to": 3230, "value": 769.99}, {"color": "#9a7257", "from": 3234, "label": "46.01", "to": 5910, "value": 46.01}, {"color": "#9a7257", "from": 5910, "label": "4.91", "to": 3230, "value": 4.91}, {"color": "#9a7257", "from": 3230, "label": "697.05", "to": 3231, "value": 697.05}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
