        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#d0286c", "customUrl": "https://pacviewer.com/address/pc1z0geplzh50v6syldzrkk64usqwgyesnsnqza6y2", "id": 5634, "label": "pc1z0geplzh50v6syldzrkk64usqwgyesnsnqza6y2", "shape": "dot", "title": "pc1z0geplzh50v6syldzrkk64usqwgyesnsnqza6y2", "x": -3196.1698670034507, "y": -250.31093812722034}, {"color": "#000000", "customUrl": "https://pacviewer.com/address/pc1zdd8aexwe7nvqfe9pr8mw9htutrsae9p2rtljhv", "id": 5635, "label": "pc1zdd8aexwe7nvqfe9pr8mw9htutrsae9p2rtljhv, Send to \u0027Xeggex Exchange\u0027", "shape": "triangle", "title": "pc1zdd8aexwe7nvqfe9pr8mw9htutrsae9p2rtljhv", "x": -1092.1391754834144, "y": -85.53922437981052}, {"color": "#d0286c", "customUrl": "https://pacviewer.com/address/pc1znr5jezx4mt55ak402x478mrp5z3ad9mz8kkr3p", "id": 5733, "label": "pc1znr5jezx4mt55ak402x478mrp5z3ad9mz8kkr3p", "shape": "dot", "title": "pc1znr5jezx4mt55ak402x478mrp5z3ad9mz8kkr3p", "x": 1091.6221200136067, "y": 85.48426960186403}, {"color": "#d0286c", "customUrl": "https://pacviewer.com/address/pc1ps4hnwavh64quyva48scd5y0qfrpe9ux56fu60v", "id": 6490, "label": "pc1ps4hnwavh64quyva48scd5y0qfrpe9ux56fu60v", "shape": "square", "title": "pc1ps4hnwavh64quyva48scd5y0qfrpe9ux56fu60v", "x": -4999.596819271058, "y": -391.53850934596085}, {"color": "#d0286c", "customUrl": "https://pacviewer.com/address/pc1zdrfxmq49tglwrpnzdfuse34f0zm358jkz49797", "id": 6237, "label": "pc1zdrfxmq49tglwrpnzdfuse34f0zm358jkz49797", "shape": "dot", "title": "pc1zdrfxmq49tglwrpnzdfuse34f0zm358jkz49797", "x": 5000.0, "y": 391.5864247556465}, {"color": "#d0286c", "customUrl": "https://pacviewer.com/address/pc1p5x8gz8a8gqv6wcvnpuc922s4zq5954qrtgn7ym", "id": 6238, "label": "pc1p5x8gz8a8gqv6wcvnpuc922s4zq5954qrtgn7ym", "shape": "square", "title": "pc1p5x8gz8a8gqv6wcvnpuc922s4zq5954qrtgn7ym", "x": 3196.283741744317, "y": 250.31797749548141}]);
                  edges = new vis.DataSet([{"color": "#d0286c", "from": 5634, "label": "1015.5", "to": 5635, "value": 1015.5}, {"color": "#d0286c", "from": 5634, "label": "999.9", "to": 6490, "value": 999.9}, {"color": "#d0286c", "from": 5635, "label": "836.5", "to": 5733, "value": 836.5}, {"color": "#d0286c", "from": 5733, "label": "814.9", "to": 6238, "value": 814.9}, {"color": "#d0286c", "from": 6237, "label": "12.0", "to": 6238, "value": 12.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
