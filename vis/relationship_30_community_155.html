        <script type="text/javascript">

              // initialize global variables.

              var nodeColors;

              var network;
              var container;
              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#99804c", "customUrl": "https://pacviewer.com/address/pc1re356hszae89ygewpwjy7qscd92kdcpjgzns7d8", "id": 2051, "label": "pc1re356hszae89ygewpwjy7qscd92kdcpjgzns7d8", "shape": "dot", "title": "pc1re356hszae89ygewpwjy7qscd92kdcpjgzns7d8", "x": 1639.9087507627921, "y": -4775.7595405936345}, {"color": "#99804c", "customUrl": "https://pacviewer.com/address/pc1znlctmhuhjcx7j4xmlcr5vsc8jfuqr99g82576d", "id": 2083, "label": "pc1znlctmhuhjcx7j4xmlcr5vsc8jfuqr99g82576d", "shape": "dot", "title": "pc1znlctmhuhjcx7j4xmlcr5vsc8jfuqr99g82576d", "x": -453.6162473555278, "y": -43.376677482569754}, {"color": "#99804c", "customUrl": "https://pacviewer.com/address/pc1p5y7kj3glw4dejft0uyry473z925lur202zmtzr", "id": 2052, "label": "pc1p5y7kj3glw4dejft0uyry473z925lur202zmtzr", "shape": "square", "title": "pc1p5y7kj3glw4dejft0uyry473z925lur202zmtzr", "x": 708.185673265752, "y": -2611.393969478513}, {"color": "#99804c", "customUrl": "https://pacviewer.com/address/pc1py4gdpqwvzmlfhlwgzu079248uf8jyzqu5xa24n", "id": 2084, "label": "pc1py4gdpqwvzmlfhlwgzu079248uf8jyzqu5xa24n", "shape": "square", "title": "pc1py4gdpqwvzmlfhlwgzu079248uf8jyzqu5xa24n", "x": -2800.040342988439, "y": -267.7515393936926}, {"color": "#99804c", "customUrl": "https://pacviewer.com/address/pc1rgpx9gnmf0l2paxdua7s62swn0v9fnp5l7gqlwu", "id": 2055, "label": "pc1rgpx9gnmf0l2paxdua7s62swn0v9fnp5l7gqlwu", "shape": "dot", "title": "pc1rgpx9gnmf0l2paxdua7s62swn0v9fnp5l7gqlwu", "x": 705.1098356411176, "y": 5000.0}, {"color": "#99804c", "customUrl": "https://pacviewer.com/address/pc1psvhv63cqmttzlvv2vpqgc5e9d0p4qm6se6rxwq", "id": 2056, "label": "pc1psvhv63cqmttzlvv2vpqgc5e9d0p4qm6se6rxwq", "shape": "square", "title": "pc1psvhv63cqmttzlvv2vpqgc5e9d0p4qm6se6rxwq", "x": 200.4523306743046, "y": 2698.28172694841}]);
                  edges = new vis.DataSet([{"color": "#99804c", "from": 2051, "label": "94.9", "to": 2052, "value": 94.9}, {"color": "#99804c", "from": 2083, "label": "546.1", "to": 2052, "value": 546.1}, {"color": "#99804c", "from": 2083, "label": "60.0", "to": 2056, "value": 60.0}, {"color": "#99804c", "from": 2083, "label": "84.0", "to": 2084, "value": 84.0}, {"color": "#99804c", "from": 2055, "label": "119.01", "to": 2056, "value": 119.01}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
