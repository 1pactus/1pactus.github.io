        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var nodeColors;
              var originalNodes;
              var network;

              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#b8aa2a", "customUrl": "https://pacviewer.com/address/pc1rt9y8ftdv7ktknhmszzcudur6xr753pfvxzurkg", "id": 6401, "label": "pc1rt9y8ftdv7ktknhmszzcudur6xr753pfvxzurkg", "shape": "dot", "title": "pc1rt9y8ftdv7ktknhmszzcudur6xr753pfvxzurkg", "x": -834.4922534612335, "y": 899.1078909575668}, {"color": "#b8aa2a", "customUrl": "https://pacviewer.com/address/pc1z4h9652p5j9yuc3e0zay2jqhd9vvv5jyw9ynwrq", "id": 5679, "label": "pc1z4h9652p5j9yuc3e0zay2jqhd9vvv5jyw9ynwrq", "shape": "dot", "title": "pc1z4h9652p5j9yuc3e0zay2jqhd9vvv5jyw9ynwrq", "x": 834.203347889081, "y": -896.9828835033212}, {"color": "#b8aa2a", "customUrl": "https://pacviewer.com/address/pc1p3qveequtdrstnphvwkmfufgtr74jj0zd2w7agn", "id": 5680, "label": "pc1p3qveequtdrstnphvwkmfufgtr74jj0zd2w7agn", "shape": "square", "title": "pc1p3qveequtdrstnphvwkmfufgtr74jj0zd2w7agn", "x": -697.7460285609103, "y": -4963.756290469191}, {"color": "#b8aa2a", "customUrl": "https://pacviewer.com/address/pc1pe7frgk52j4whtupyj48fl6429dwhgazfdcy32z", "id": 5681, "label": "pc1pe7frgk52j4whtupyj48fl6429dwhgazfdcy32z", "shape": "square", "title": "pc1pe7frgk52j4whtupyj48fl6429dwhgazfdcy32z", "x": -5000.0, "y": -334.57088162016754}, {"color": "#b8aa2a", "customUrl": "https://pacviewer.com/address/pc1pefj0mq0ccp93vyvry3akda35ty3s65ccxdc9pf", "id": 5682, "label": "pc1pefj0mq0ccp93vyvry3akda35ty3s65ccxdc9pf", "shape": "square", "title": "pc1pefj0mq0ccp93vyvry3akda35ty3s65ccxdc9pf", "x": 4999.781264103468, "y": 332.9054156537957}, {"color": "#b8aa2a", "customUrl": "https://pacviewer.com/address/pc1pnpt8rnhxjt6up8fmfa0m8j3k8r4qhg2qha9t0e", "id": 5683, "label": "pc1pnpt8rnhxjt6up8fmfa0m8j3k8r4qhg2qha9t0e", "shape": "square", "title": "pc1pnpt8rnhxjt6up8fmfa0m8j3k8r4qhg2qha9t0e", "x": 698.2536700295952, "y": 4963.296748981315}]);
                  edges = new vis.DataSet([{"color": "#b8aa2a", "from": 6401, "label": "44.1", "to": 5681, "value": 44.1}, {"color": "#b8aa2a", "from": 6401, "label": "53.21", "to": 5680, "value": 53.21}, {"color": "#b8aa2a", "from": 6401, "label": "23.81", "to": 5682, "value": 23.81}, {"color": "#b8aa2a", "from": 6401, "label": "46.9", "to": 5683, "value": 46.9}, {"color": "#b8aa2a", "from": 5679, "label": "178.52", "to": 5680, "value": 178.52}, {"color": "#b8aa2a", "from": 5679, "label": "206.53", "to": 5681, "value": 206.53}, {"color": "#b8aa2a", "from": 5679, "label": "84.01", "to": 5682, "value": 84.01}, {"color": "#b8aa2a", "from": 5679, "label": "184.1", "to": 5683, "value": 184.1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
