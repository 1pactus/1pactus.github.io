        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#50bc68", "customUrl": "https://pacviewer.com/address/pc1zv0xl6r0ar7rxyax5ycm5rf46gjc8a89xfap2wt", "id": 5448, "label": "pc1zv0xl6r0ar7rxyax5ycm5rf46gjc8a89xfap2wt", "shape": "dot", "title": "pc1zv0xl6r0ar7rxyax5ycm5rf46gjc8a89xfap2wt", "x": 3196.5456049218383, "y": -1379.9963810581978}, {"color": "#50bc68", "customUrl": "https://pacviewer.com/address/pc1ptgdaqh79u8974tm0n42qf9hqswlrmuzv52jcyf", "id": 5449, "label": "pc1ptgdaqh79u8974tm0n42qf9hqswlrmuzv52jcyf", "shape": "square", "title": "pc1ptgdaqh79u8974tm0n42qf9hqswlrmuzv52jcyf", "x": 4999.664131896221, "y": -2158.4290923158123}, {"color": "#50bc68", "customUrl": "https://pacviewer.com/address/pc1zpsjcnhh800kjh33uxm5q7cf846undru4lwqp45", "id": 3697, "label": "pc1zpsjcnhh800kjh33uxm5q7cf846undru4lwqp45", "shape": "dot", "title": "pc1zpsjcnhh800kjh33uxm5q7cf846undru4lwqp45", "x": -1091.6363258650424, "y": 471.27537969352113}, {"color": "#50bc68", "customUrl": "https://pacviewer.com/address/pc1zujua9s34d96qt30m9x6tjfwp7908uz9pcy47fv", "id": 5436, "label": "pc1zujua9s34d96qt30m9x6tjfwp7908uz9pcy47fv", "shape": "dot", "title": "pc1zujua9s34d96qt30m9x6tjfwp7908uz9pcy47fv", "x": 1092.36554767812, "y": -471.5907368223236}, {"color": "#50bc68", "customUrl": "https://pacviewer.com/address/pc1pgkwm8vraznu8965lww36e9una2mhu440d4weu6", "id": 5437, "label": "pc1pgkwm8vraznu8965lww36e9una2mhu440d4weu6", "shape": "square", "title": "pc1pgkwm8vraznu8965lww36e9una2mhu440d4weu6", "x": -3196.938958631138, "y": 1380.1660801501598}, {"color": "#50bc68", "customUrl": "https://pacviewer.com/address/pc1rk6e63v65dj0mv633695qfzpfc0q04jh83lcdzc", "id": 6111, "label": "pc1rk6e63v65dj0mv633695qfzpfc0q04jh83lcdzc", "shape": "dot", "title": "pc1rk6e63v65dj0mv633695qfzpfc0q04jh83lcdzc", "x": -5000.0, "y": 2158.5747503526536}]);
                  edges = new vis.DataSet([{"color": "#50bc68", "from": 5448, "label": "120.0", "to": 5436, "value": 120.0}, {"color": "#50bc68", "from": 5448, "label": "100.08", "to": 5449, "value": 100.08}, {"color": "#50bc68", "from": 3697, "label": "126.0", "to": 5436, "value": 126.0}, {"color": "#50bc68", "from": 3697, "label": "55.01", "to": 5437, "value": 55.01}, {"color": "#50bc68", "from": 5437, "label": "21.01", "to": 6111, "value": 21.01}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
