        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var allEdges;
              var nodeColors;

              var network;
              var container;
              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#faa00d", "customUrl": "https://pacviewer.com/address/pc1zxekkkx4cde4uysh4jtkxjz2j5kkn92rafsu0ht", "id": 4359, "label": "pc1zxekkkx4cde4uysh4jtkxjz2j5kkn92rafsu0ht", "shape": "dot", "title": "pc1zxekkkx4cde4uysh4jtkxjz2j5kkn92rafsu0ht", "x": 2019.6857941179007, "y": -2092.3564148854653}, {"color": "#faa00d", "customUrl": "https://pacviewer.com/address/pc1pyute7xhr52qrp9e0xzc2sjq98gk822ldhc4qfv", "id": 4360, "label": "pc1pyute7xhr52qrp9e0xzc2sjq98gk822ldhc4qfv", "shape": "square", "title": "pc1pyute7xhr52qrp9e0xzc2sjq98gk822ldhc4qfv", "x": 3505.632077052505, "y": -4138.05221234348}, {"color": "#faa00d", "customUrl": "https://pacviewer.com/address/pc1zvwdhe4chw2e8lnmcycuuv6xuawl8mf3ajaargr", "id": 2604, "label": "pc1zvwdhe4chw2e8lnmcycuuv6xuawl8mf3ajaargr", "shape": "dot", "title": "pc1zvwdhe4chw2e8lnmcycuuv6xuawl8mf3ajaargr", "x": 287.8149373834743, "y": 392.5345336310727}, {"color": "#faa00d", "customUrl": "https://pacviewer.com/address/pc1pqz38pf74mc3v9drrczf87cp2zkxsp4qxkp9034", "id": 2605, "label": "pc1pqz38pf74mc3v9drrczf87cp2zkxsp4qxkp9034", "shape": "square", "title": "pc1pqz38pf74mc3v9drrczf87cp2zkxsp4qxkp9034", "x": -2601.007132197279, "y": 1302.2732299777056}, {"color": "#faa00d", "customUrl": "https://pacviewer.com/address/pc1ptjaa9hpz34fxlvyc82n4q5223q5v05kpka7480", "id": 2606, "label": "pc1ptjaa9hpz34fxlvyc82n4q5223q5v05kpka7480", "shape": "square", "title": "pc1ptjaa9hpz34fxlvyc82n4q5223q5v05kpka7480", "x": 1787.8743236433986, "y": 2429.118850821216}, {"color": "#faa00d", "customUrl": "https://pacviewer.com/address/pc1z07swy3wy7mpryv3ayaypmqmy3jhn0dyws7pf9x", "id": 5434, "label": "pc1z07swy3wy7mpryv3ayaypmqmy3jhn0dyws7pf9x", "shape": "dot", "title": "pc1z07swy3wy7mpryv3ayaypmqmy3jhn0dyws7pf9x", "x": -5000.0, "y": 2106.482012798951}]);
                  edges = new vis.DataSet([{"color": "#faa00d", "from": 4359, "label": "176.0", "to": 2604, "value": 176.0}, {"color": "#faa00d", "from": 4359, "label": "531.02", "to": 4360, "value": 531.02}, {"color": "#faa00d", "from": 2604, "label": "328.0", "to": 2605, "value": 328.0}, {"color": "#faa00d", "from": 2604, "label": "562.08", "to": 2606, "value": 562.08}, {"color": "#faa00d", "from": 2605, "label": "483.04", "to": 5434, "value": 483.04}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
