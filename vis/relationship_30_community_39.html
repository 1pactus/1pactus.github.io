        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#c64eb9", "customUrl": "https://pacviewer.com/address/pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "id": 961, "label": "pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "shape": "dot", "title": "pc1rzp0ljl0cnav30p5rwf7afx9r9wuzrukd9upmjz", "x": -141.1067692240623, "y": 621.3614287518042}, {"color": "#c64eb9", "customUrl": "https://pacviewer.com/address/pc1rc5h3wkh5axszm9fpyczzyfddwnas3mvsr0qnw7", "id": 2722, "label": "pc1rc5h3wkh5axszm9fpyczzyfddwnas3mvsr0qnw7", "shape": "dot", "title": "pc1rc5h3wkh5axszm9fpyczzyfddwnas3mvsr0qnw7", "x": 2215.2931939191576, "y": -3031.756737924889}, {"color": "#c64eb9", "customUrl": "https://pacviewer.com/address/pc1rsyh42v3rrnrn02drqqvmh5p709393nyta00000", "id": 2721, "label": "pc1rsyh42v3rrnrn02drqqvmh5p709393nyta00000", "shape": "dot", "title": "pc1rsyh42v3rrnrn02drqqvmh5p709393nyta00000", "x": -688.5573438271263, "y": -3691.20059959954}, {"color": "#c64eb9", "customUrl": "https://pacviewer.com/address/pc1rdly82szqk2nrd9l5yz08y2t7ehq5svnm6uusq7", "id": 963, "label": "pc1rdly82szqk2nrd9l5yz08y2t7ehq5svnm6uusq7", "shape": "dot", "title": "pc1rdly82szqk2nrd9l5yz08y2t7ehq5svnm6uusq7", "x": 429.00030835538934, "y": -1889.0961631337025}, {"color": "#c64eb9", "customUrl": "https://pacviewer.com/address/pc1ppq6a97ujmfw57zap3fuwqnrmjykm4y7l9ze58c", "id": 962, "label": "pc1ppq6a97ujmfw57zap3fuwqnrmjykm4y7l9ze58c", "shape": "square", "title": "pc1ppq6a97ujmfw57zap3fuwqnrmjykm4y7l9ze58c", "x": -679.1649176715061, "y": 2990.692071906328}, {"color": "#c64eb9", "customUrl": "https://pacviewer.com/address/pc1zfeygxpmslu2z3zv7e36kmsyqkdett4gm0jh3l6", "id": 4251, "label": "pc1zfeygxpmslu2z3zv7e36kmsyqkdett4gm0jh3l6", "shape": "dot", "title": "pc1zfeygxpmslu2z3zv7e36kmsyqkdett4gm0jh3l6", "x": -1135.464471551852, "y": 5000.0}]);
                  edges = new vis.DataSet([{"color": "#c64eb9", "from": 961, "label": "400.0", "to": 962, "value": 400.0}, {"color": "#c64eb9", "from": 961, "label": "400.0", "to": 963, "value": 400.0}, {"color": "#c64eb9", "from": 2722, "label": "1.0", "to": 963, "value": 1.0}, {"color": "#c64eb9", "from": 2721, "label": "100.0", "to": 963, "value": 100.0}, {"color": "#c64eb9", "from": 962, "label": "1.0", "to": 4251, "value": 1.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
