        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1r7f98xjwhxy6hcwsx2syfjnjcdq87hv07m8mzap", "id": 1, "label": "pc1r7f98xjwhxy6hcwsx2syfjnjcdq87hv07m8mzap", "shape": "dot", "title": "pc1r7f98xjwhxy6hcwsx2syfjnjcdq87hv07m8mzap", "x": 2174.197648603649, "y": 1814.6580714089189}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1petjkq2njak4djlujel362ga2c77udx723fmjtx", "id": 2, "label": "pc1petjkq2njak4djlujel362ga2c77udx723fmjtx", "shape": "square", "title": "pc1petjkq2njak4djlujel362ga2c77udx723fmjtx", "x": 2065.031230706828, "y": -2266.799309229321}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1rdt855kn9s2cu3urs9d22cyshxen56fngrzctfs", "id": 1464, "label": "pc1rdt855kn9s2cu3urs9d22cyshxen56fngrzctfs", "shape": "dot", "title": "pc1rdt855kn9s2cu3urs9d22cyshxen56fngrzctfs", "x": -591.3770115920015, "y": 18.824537347371503}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1pjnsw5m90psemlc3parf80cenvvhjlgu3rvxfk8", "id": 1465, "label": "pc1pjnsw5m90psemlc3parf80cenvvhjlgu3rvxfk8", "shape": "square", "title": "pc1pjnsw5m90psemlc3parf80cenvvhjlgu3rvxfk8", "x": -4481.878854880087, "y": -3006.8875342272954}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1pzel6xhutkr4mln3ftzw6v74y2kqlm3wv7x48ma", "id": 1466, "label": "pc1pzel6xhutkr4mln3ftzw6v74y2kqlm3wv7x48ma", "shape": "square", "title": "pc1pzel6xhutkr4mln3ftzw6v74y2kqlm3wv7x48ma", "x": 5000.0, "y": 20.55102758523427}, {"color": "#1f77b4", "customUrl": "https://pacviewer.com/address/pc1pp9h725h0cxkk28kdl5u65zh42ey5m6pmrf7pdd", "id": 1467, "label": "pc1pp9h725h0cxkk28kdl5u65zh42ey5m6pmrf7pdd", "shape": "square", "title": "pc1pp9h725h0cxkk28kdl5u65zh42ey5m6pmrf7pdd", "x": -4165.97301283839, "y": 3419.653207115091}]);
                  edges = new vis.DataSet([{"color": "#1f77b4", "from": 1, "label": "1000.0", "to": 2, "value": 1000.0}, {"color": "#1f77b4", "from": 1, "label": "52.0", "to": 1464, "value": 52.0}, {"color": "#1f77b4", "from": 2, "label": "32.2", "to": 1464, "value": 32.2}, {"color": "#1f77b4", "from": 1464, "label": "49.02", "to": 1465, "value": 49.02}, {"color": "#1f77b4", "from": 1464, "label": "46.2", "to": 1466, "value": 46.2}, {"color": "#1f77b4", "from": 1464, "label": "38.5", "to": 1467, "value": 38.5}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
              drawGraph();
