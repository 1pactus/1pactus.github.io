        <script type="text/javascript">

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#86c81e", "customUrl": "https://pacviewer.com/address/pc1rdt855kn9s2cu3urs9d22cyshxen56fngrzctfs", "id": 5124, "label": "pc1rdt855kn9s2cu3urs9d22cyshxen56fngrzctfs", "shape": "dot", "title": "pc1rdt855kn9s2cu3urs9d22cyshxen56fngrzctfs", "x": -32.57895680501125, "y": -201.36038985580757}, {"color": "#86c81e", "customUrl": "https://pacviewer.com/address/pc1pjnsw5m90psemlc3parf80cenvvhjlgu3rvxfk8", "id": 5125, "label": "pc1pjnsw5m90psemlc3parf80cenvvhjlgu3rvxfk8", "shape": "square", "title": "pc1pjnsw5m90psemlc3parf80cenvvhjlgu3rvxfk8", "x": 4402.917965432036, "y": -2221.018536429147}, {"color": "#86c81e", "customUrl": "https://pacviewer.com/address/pc1pp9h725h0cxkk28kdl5u65zh42ey5m6pmrf7pdd", "id": 5126, "label": "pc1pp9h725h0cxkk28kdl5u65zh42ey5m6pmrf7pdd", "shape": "square", "title": "pc1pp9h725h0cxkk28kdl5u65zh42ey5m6pmrf7pdd", "x": -797.3469512509878, "y": -5000.0}, {"color": "#86c81e", "customUrl": "https://pacviewer.com/address/pc1pzel6xhutkr4mln3ftzw6v74y2kqlm3wv7x48ma", "id": 5127, "label": "pc1pzel6xhutkr4mln3ftzw6v74y2kqlm3wv7x48ma", "shape": "square", "title": "pc1pzel6xhutkr4mln3ftzw6v74y2kqlm3wv7x48ma", "x": -4876.22835283758, "y": -742.8669462693838}, {"color": "#86c81e", "customUrl": "https://pacviewer.com/address/pc1r7f98xjwhxy6hcwsx2syfjnjcdq87hv07m8mzap", "id": 4106, "label": "pc1r7f98xjwhxy6hcwsx2syfjnjcdq87hv07m8mzap", "shape": "dot", "title": "pc1r7f98xjwhxy6hcwsx2syfjnjcdq87hv07m8mzap", "x": 2156.750055562403, "y": 3840.961134148055}, {"color": "#86c81e", "customUrl": "https://pacviewer.com/address/pc1petjkq2njak4djlujel362ga2c77udx723fmjtx", "id": 4107, "label": "pc1petjkq2njak4djlujel362ga2c77udx723fmjtx", "shape": "square", "title": "pc1petjkq2njak4djlujel362ga2c77udx723fmjtx", "x": -853.5137601008596, "y": 4324.284738406284}]);
                  edges = new vis.DataSet([{"color": "#86c81e", "from": 5124, "label": "724.0", "to": 4106, "value": 724.0}, {"color": "#86c81e", "from": 5124, "label": "226.82", "to": 5125, "value": 226.82}, {"color": "#86c81e", "from": 5124, "label": "208.6", "to": 5126, "value": 208.6}, {"color": "#86c81e", "from": 5124, "label": "238.05", "to": 5127, "value": 238.05}, {"color": "#86c81e", "from": 5124, "label": "9.8", "to": 4107, "value": 9.8}, {"color": "#86c81e", "from": 4106, "label": "1000.0", "to": 4107, "value": 1000.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"interaction": {"multiselect": true, "selectable": true, "dragView": true, "dragNodes": true, "selectConnectedEdges": true, "hover": true, "hoverConnectedEdges": true}, "physics": {"enabled": false, "stabilization": {"enabled": true, "fit": true}}, "edges": {"smooth": {"type": "continuous"}, "color": {"opacity": 1.0}}, "nodes": {"opacity": 1, "scaling": {"min": 20, "max": 30}, "color": {"background": "#97C2FC", "border": "#2B7CE9", "highlight": {"background": "#D2E5FF", "border": "#2B7CE9"}}}, "configure": {"enabled": false}};

                  


                  

                  network = new vis.Network(container, data, options);

    network.on("doubleClick", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("oncontext", function(params) {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        if (nodeId) {
            const node = network.body.data.nodes.get(nodeId);
            if (node.customUrl) {
                window.open(node.customUrl, '_blank');
            }
        }
    });

    network.on("click", function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            selectNode([nodeId]);
        } else if (params.nodes.length === 0) {
            neighbourhoodHighlight({nodes: []});
        }
    });

    function selectNodeByAddress() {
        let address = window.location.hash.substring(1).toLowerCase();
        if(address) {
            let nodes = network.body.data.nodes.get();
            let targetNode = nodes.find(node => 
                node.title && node.title.toLowerCase() === address
            );
            
            if(targetNode) {
                network.selectNodes([targetNode.id]);
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: true
                });
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(selectNodeByAddress, 1000);
    });

    window.addEventListener('hashchange', function() {
        selectNodeByAddress();
    });
    
    var style = document.createElement('style');
    style.textContent = '#select-menu { display: none !important; }';
    document.head.appendChild(style);


                  

                  

                  


                  

                  return network;

              }
